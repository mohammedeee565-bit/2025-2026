   "q": "اشرح بالتفصيل الأنشطة العامة التي تقوم بها مختلف أنواع المكتبات ومراكز المعلومات مع التركيز على المحاور الثلاثة الرئيسية لهذه الأنشطة ومستويات خدمات المعلومات.",
   "a": "تمثل الأنشطة العامة التي تقوم بها مختلف أنواع المكتبات ومراكز المعلومات الإطار المتكامل لعمل هذه المؤسسات رغم اختلافها في الأهداف والإمكانيات والخدمات. وتتمحور هذه الأنشطة حول ثلاثة محاور رئيسية متكاملة ومترابطة تعمل معاً لتحقيق أهداف المؤسسة المعلوماتية وتلبية احتياجات المستفيدين.\n\nالمحور الأول هو الإدارة والتمويل واختيار الموظفين. ويتضمن دور مدير المكتبة أو مركز المعلومات الذي يقوم بمسؤولية تحديد الأهداف ووضع السياسات والبرامج التي تحقق هذه الأهداف، كما أنه مسؤول عن وضع تنظيمات الخدمات والموظفين والتوجيه والرقابة لضمان حسن أداء الخدمات المختلفة. ويشمل عمله صياغة القواعد اللازمة لعمليات الإعارة والتسجيل والمراجع والتصوير وإعداد الميزانية وتخطيط المبنى والتجهيزات وإعداد جداول المرتبات. كما يختص بالتوصية بتعيين الموظفين واختيارهم وترقياتهم وتحديد الواجبات. وتتنوع الميزانيات إلى رأسمالية تتصل بالإنشاءات على المدى البعيد والقريب والمباني والتجهيزات الثابتة وجارية تشمل الرواتب والمطبوعات والصيانة. وتتطلب المكتبات توظيف مهنيين وتخصصيين في المكتبات والمعلومات والاختصاصيين في الموضوعات من البكالوريوس إلى الدكتوراة.\n\nالمحور الثاني هو بناء المجموعات ومصادر المعلومات ويعتمد على الأهداف واحتياجات المستفيدين. ويهدف إلى تحقيق التوازن بين الموضوعات وأشكال المقتنيات كالكتب والدوريات والرسائل والصحف والمخطوطات والوسائل السمعية والبصرية والمواد المرجعية والعادية. وتتعدد الأدوات الببليوجرافية كالببليوجرافيات القومية وفهارس الناشرين. وتتنوع تصنيفات المصادر حسب طبيعة الورود إلى أولية وثانوية ومن الدرجة الثالثة وحسب الشكل إلى مطبوعة وسمعية بصرية ومقروءة آلياً. ويتم الحصول على المصادر عن طريق الشراء أو التبادل أو الإهداء وعن طريق ملاحظة المستفيدين وتلقي مقترحاتهم والتحليل الإحصائي لسجلات المعلومات.\n\nالمحور الثالث هو تنظيم المجموعات وتقديم خدمات المعلومات. ويتضمن التصنيف باستخدام نظم مثل ديوي العشري وتصنيف الكونجرس والفهرسة الوصفية والموضوعية والتكشيف والاستخلاص. أما خدمات المعلومات فتشمل الخدمات المرجعية وتداول أوعية المعلومات وإعداد الببليوجرافيات والكشافات والمستخلصات والترجمة والإحاطة الجارية والبث الانتقائي والتصوير والنشر وتدريب المستفيدين. وهناك ثلاثة مستويات: أدناها يتطلب قيام اختصاصي المعلومات بنفسه ببث المعلومات والمتوسط يتصل بإحاطة الإنتاج الفكري وأعلاها خدمات مراكز تحليل المعلومات التي قد تقوم بتخليق معلومات جديدة. ولم يعد تقييم فاعلية المكتبة يعتمد فقط على بنائها بل أصبح يُقيم بمدى استخداماتها ومدى ما تقدمه من خدمات.",
   "ch": "ch1",
   "chNum": 1

  {
   "q": "اشرح بالتفصيل نظم التصنيف الرئيسية المستخدمة في تنظيم مجموعات المكتبات مع المقارنة بينها من حيث الأسس والخصائص والمجالات الرئيسية للمعرفة.",
   "a": "تعتمد المكتبات على نظم التصنيف لتنظيم مجموعاتها حيث يعني التصنيف وضع الكتب ذات الموضوع الواحد في مكان واحد لتيسير الوصول إليها. ومن أهم نظم التصنيف المستخدمة في المكتبات ومراكز المعلومات ما يلي:\n\nأولاً تصنيف ديوي العشري: صدرت آخر طبعة منه عام ألف وتسعمائة وأربعة وثمانين ويعتمد على تقسيم المعرفة الإنسانية إلى عشرة مجالات رئيسية. وكل مجال ينقسم بدوره إلى عشرة أقسام وكل قسم ينقسم إلى عشرة فروع وهكذا في نظام هرمي متسلسل. ويُعبر عن كل موضوع بواسطة الأرقام فقط. ويشمل رقم استدعاء الكتاب موضوع الكتاب معبراً عنه برقم التصنيف بالإضافة إلى أحرف من اسم المؤلف أو اسم المؤلف والعنوان. ويتم ترتيب الكتب على الرفوف حسب أرقام التصنيف ويُعد من أكثر النظم استخداماً خاصة في المكتبات العامة والمدرسية والمتوسطة الحجم.\n\nثانياً تصنيف مكتبة الكونجرس: يستخدم الحروف والأرقام معاً بدلاً من الأرقام فقط. وتوضح المجالات الرئيسية بالأحرف الكبيرة الإنجليزية بينما الأقسام الفرعية توضح بالأرقام. ويضم واحد وعشرون مالاً رئيسياً للمعرفة في مقابل عشرة مجالات في تصنيف ديوي. ويُعد أكثر ملاءمة للمكتبات الكبرى والمتخصصة نظراً لسعته في استيعاب التخصصات الدقيقة والفرعية. ويتميز بالمرونة في التعبير عن الموضوعات المعاصرة والجديدة.\n\nثالثاً التصنيف الببليوجرافي لبليس: وهو تصنيف متخصص يُستخدم بشكل محدود مقارنة بالتصنيفين السابقين ويتميز بتركيزه على الجوانب الببليوجرافية للمواد المكتبية.\n\nرابعاً تصنيف الكولون لرانجاناتان: يعتمد على فكرة الجوانب المتعددة للمعرفة حيث يمكن التعبير عن أي موضوع من خلال الجمع بين جوانب مختلفة مما يوفر مرونة عالية في التعبير عن الموضوعات المركبة والمعقدة.\n\nخامساً التصنيف العشري العالمي: وهو تصنيف مستوحى من تصنيف ديوي مع تعديلات وتحسينات ليناسب الاحتياجات المحلية والدولية. وتوجد تصانيف كثيرة أخرى مقتبسة ومستوحاة من التصانيف السابقة. ويتم اختيار النظام المناسب حسب نوع المكتبة وأهدافها وطبيعة مجموعاتها وحجمها واختصاصها. فالمكتبات الأكاديمية والجامعية تميل لاستخدام تصنيف الكونجرس بينما المكتبات العامة والمدرسية تميل لاستخدام تصنيف ديوي العشري لسهولته. ويترتب على جودة التصنيف سرعة تيسير الوصول إلى المصادر وتقليل الوقت والجهد المبذولين في البحث. وبذلك يتضح أن لكل نظام تصنيف مميزاته وعيوبه وأن اختيار النظام المناسب يعتمد على عدة عوامل متشابكة منها حجم المجموعة وطبيعة الموضوعات واحتياجات المستفيدين والتخصص الجغرافي واللغوي للمكتبة. والمقارنة بين هذه الأنظمة تكشف أن تصنيف ديوي أكثر بساطة وسهولة في التطبيق بينما تصنيف الكونجرس أكثر مرونة وسعة. كما أن كل نظام يحتاج إلى تعديلات وتحديثات دورية لمواكبة التطور في مجالات المعرفة المتنوعة والمستحدثة.",

  {
   "q": "اشرح بالتفصيل مفهوم خدمات المعلومات في مجال المكتبات وأنواعها المختلفة مع بيان الوظائف التي تحققها ودور أخصائي المراجع في تقديم هذه الخدمات.",
   "a": "تُعد خدمات المعلومات المحور الأساسي لنجاح أي مكتبة أو مركز معلومات حيث لم يعد تقييم فاعلية المكتبة يعتمد فقط على بنائها وتنظيمها ومقتنياتها بل أصبح يُقيم بمدى استخداماتها ومدى ما تقدمه من خدمات لمرتاديها. وحتى تتمكن أي مكتبة من تحقيق أهدافها عليها ثلاثة أعمال أساسية: توفير ما يحتاجه الرواد من مواد مكتبية، وتنظيم هذه المواد بشكل يساعد على استخدامها، وتقديم ما يلائمهم من خدمات معلوماتية.\n\nوتحقق خدمات المعلومات وظائف عديدة أهمها: توفير مصادر المعلومات المناسبة للمستفيدين، وتلبية احتياجاتهم المتغيرة تبعاً لتغير ظروف الحاجة، وسرعة الإحاطة بالمصادر المناسبة، ومراعاة الدقة فيما يُقدم، ومساعدة المستفيد على تجاوز الحواجز اللغوية، وتقديم معلومات متلائمة مع إمكانياته. وتشمل أنواع الخدمات: الخدمات المرجعية والرد على الاستفسارات وهي قمة العمل المكتبي حيث يقدم أمين المراجع المعلومات لا الكتب ويجيب على الأسئلة المتعلقة بالحقائق والموضوعات، وخدمات تداول أوعية المعلومات التي تشمل الإعارة وتبادل المصادر بين المراكز، وإعداد القوائم الببليوجرافية والكشافات والمستخلصات التي تشمل حصراً خارجياً وداخلياً لمحتويات الدوريات، والترجمة التي تعتبر خدمة أساسية نظراً لأن النشر العلمي يتم بلغات عديدة وعلى المركز أن يتعرف من المصادر العالمية عن وجود ترجمة حتى لا يكرر ترجمة نفس المقال، وخدمات الإحاطة الجارية بالمعلومات المنشورة حديثاً وتوجيهها للباحثين في تخصص معين، والبث الانتقائي للمعلومات الموجه لفرد معين حسب سماته واهتماماته، وخدمة التصوير والاستنساخ، والنشر وإصدار المطبوعات الأولية والثانوية، وتدريب المستفيدين وتوعيتهم، وخدمات العلاقات العامة وتشجيع القراءة والعلاج بالقراءة.\n\nوأمين المراجع يقوم بأعلى هذه المستويات حيث يقدم المعلومات لا الكتب ويجيب على الأسئلة المتعلقة بالحقائق والموضوعات ويقوم ببحث الإنتاج الفكري وإعداد الببليوجرافيات والمستخلصات ويعد ملفات خاصة بقصاصات الصحف والمقالات. كما يقوم بالإعارة الداخلية والخارجية والإعارة بين المكتبات وتبادل الخدمات المختلفة ويقدم دروساً وتدريبات في كيفية استخدام المكتبة والمراجع. ويتطلب ذلك دراية كافية بأدوات الاختيار ونظم التصنيف والمداخل الموضوعية والاستفادة من الخدمة الإلكترونية على الخط المباشر والأقراص المكنزة. ويعتبر تشجيع القراءة من المهام الأساسية في أي نوع من أنواع المكتبات. كما أن عملية تشجيع القراءة تُعد من بين المهام الأساسية التي يقوم بها في أي نوع من أنواع المكتبات حيث يهتم الأمين بإرشاد القراء عن كيفية اختيار المواد الملائمة لهم سواء كانت كتباً أم دوريات أم وثائق أم تقارير. ويتضمن عمله أيضاً المعاونة في وضع برامج قرائية مخططة والقيام بأحاديث الكتب ومراجعتها والتحدث عن الكتب الجديدة وإعداد المعارض التي تشمل مختلف المطبوعات التي تغطي مناسبات معينة. ويتضح من هذا أن الخدمات المرجعية تعتبر قمة خدمات المكتبات ونجاح أداء المكتبة يعتمد في النهاية على هذه الخدمة التي يقوم بها الحاصلون على أعلى المؤهلات بالمكتبة في المجالات الموضوعية وفي تخصص المكتبات والمعلومات.",

  {
   "q": "اشرح بالتفصيل خطوات تقديم الخدمة المرجعية في المكتبات مع التركيز على المقابلة المرجعية وبناء إستراتيجية البحث وإجراء البحث في المصادر المطبوعة والإلكترونية وتقديم المعلومات ومتابعة رضاء المستفيد.",
   "a": "تمر عملية تقديم الخدمة المرجعية بأربع خطوات أساسية متكاملة ومتتابعة تضمن تقديم خدمة مرجعية متميزة تحقق رضا المستفيد وإشباع حاجته إلى المعلومات.\n\nالخطوة الأولى هي تقديم السؤال إلى أخصائي المراجع ويمكن أن يتم بعدة طرق: بصورة شفوية عبر التليفون أو الحضور الشخصي للمكتبة، أو بصورة رسمية من خلال استمارة تُعد خصيصاً لتلقي استفسارات المستفيدين، أو من خلال البريد الإلكتروني، أو استخدام حجرات الدردشة مع أخصائي المراجع التي توفرها خدمات المراجع الإلكترونية في المكتبات العالمية الكبرى. وفي حالة تلقي الاستفسار بشكل غير رسمي يجب على أخصائي المراجع تحويله إلى الشكل الرسمي كملف استفسارات أو قاعدة بيانات إلكترونية يتم فيها تجميع الاستفسارات.\n\nالخطوة الثانية هي التعرف على الحدود المختلطة للاستفسار حيث يتولى أخصائي المراجع تحديد الجوانب الموضوعية والجغرافية والشكلية والزمنية للاستفسار والتعرف على مجال الاستفسار ونوع أشكال مصادر المعلومات المطلوبة والفترة الزمنية المعنية بهذا الاستفسار.\n\nالخطوة الثالثة هي المقابلة المرجعية وهي خطوة جوهرية تتضمن مهارات أساسية متعددة: الإنصات الفعال للمستفيد لإظهار الاهتمام باستهنفاره، ومحاولة شرح وتفسير تعبيرات المستفيد بإعادة صياغة ما ذكره دون إضافة أفكار جديدة مما يؤكد أن أخصائي المراجع ينصت ويهتم ويتأكد من فهمه الصحيح للاستفسار، واستخدام الأسئلة المفتوحة والمغلقة التي تتيح للمستفيد فرصة التعبير عن احتياجاته المعلوماتية بمصطلحاته الخاصة، والتوضيح باستخدام أسئلة توضيحية لتضييق أو توسيع نطاق الاستفسار حسب الحاجة، والمراجعة والفحص لمراجعة مصطلحات الاستفسار والتأكد من الهجاء السليم لتلك المصطلحات وهي خطوة هامة يمكن أن تقلل وقت البحث. وفي نهاية المقابلة يحصل أخصائي المراجع على العناصر الأساسية كالغرض من الاستفسار والوقت المناسب للإجابة واللغة والكمية ومدى العمق المطلوب وكيف ومتى وأين سيحصل المستفيد على الإجابة.\n\nالخطوة الرابعة هي تحديد المرجع المناسب وبناء إستراتيجية البحث وإجراء البحث وتقديم المعلومات والمتابعة. حيث تحتاج الأسئلة الببليوجرافية إلى أدلة الإنتاج الفكري والأسئلة المفاهيمية إلى الموسوعات. ويتم تحديد المصطلحات بالاستعانة بالمعاجم المتخصصة والمكائز للحصول على المصطلحات الأعرض والأضيق ثم الربط بينها باستخدام قواعد الربط البوليني أو تجاور المصطلحات. ويختلف بحث المصادر المطبوعة عن الإلكترونية في الأساليب المستعملة. ثم تُقدم المعلومات بالطريقة المناسبة كالبريد العادي أو الإلكتروني ويتم المتابعة للتأكد من رضاء المستفيد.",

  {
   "q": "اشرح بالتفصيل الخدمة المرجعية الإلكترونية من حيث الخلفية التاريخية والأشكال التي تُقدم بها وأثرها على إتاحة خدمات المكتبة وارتباطها بالتطور التكنولوجي المعاصر.",
   "a": "تعد الخدمة المرجعية الرقمية واحدة من أسرع الخدمات نمواً وابتكاراً التي تم تطويرها من قبل المكتبات مؤخراً. وتشير هذه الخدمة إلى شبكة من الخبراء والوسطاء والمصادر التي يتم تقديمها لسد حاجة المستفيد في البيئة التشابكية على الخط المباشر حيث تتم العملية المرجعية الرقمية عند استقبال السؤال إلكترونياً والإجابة عليه إلكترونياً أيضاً. ورغم الاهتمام بتطبيق الخدمة المرجعية الرقمية خلال الأعوام الماضية إلا أنه ما زال هناك اهتمام محدود بموضوع تقييم الخدمة.\n\nوتقدم العديد من المكتبات هذه الخدمة حالياً بأحد الأشكال التالية: كجزء من الخدمة المرجعية التقليدية حيث تُضاف القناة الإلكترونية إلى القنوات الموجودة لتعزيز إتاحة الخدمة، أو كخدمة مسقطة أي مستقلة تماماً عن الخدمة التقليدية بمنظومة خاصة وموارد مخصصة، أو كجزء من اتحاد أو تجمع تعاوني بين عدة مكتبات تستفيد من الموارد المشتركة. وفي الوقت ذاته هناك العديد من المكتبات التي تفكر في تطبيق الخدمة أو على وشك البدء فيها.\n\nومن الملاحظات المهمة أن هناك نمواً في عدد الخدمات المرجعية المقامة تحت مسميات مختلفة التي لا تنتمي في تقديمها إلى المكتبات فقط وإنما إلى القطاعات التجارية والتعليمية والمؤسسات غير الهادفة للربح. والهدف الرئيسي من تقديم الخدمة من قبل جميع هذه الجهات هو خدمة المستفيد من خلال الوسائل الإلكترونية المتاحة.\n\nوقد أحدثت الخدمة المرجعية الإلكترونية تحولاً جذرياً في إتاحة خدمات المكتبة حيث ساعدت على زيادة الإتاحة بشكل لا يعتمد في الأساس على الزيارة المادية للمكتبة. بمعنى أن مثل هذا النوع من الخدمات ساعد على عدم ضرورة التواجد الفعلي للمستفيد بالمكتبة للحصول على الخدمة المطلوبة. وقد أدى ذلك إلى تزايد استخدام واعتماد المستفيدين على الخدمات الرقمية كجزء من حياتهم اليومية. ويرى المتخصصون أن تقديم هذه الخدمة من قبل المكتبات يساعد على إعطاء المكتبات بعداً جغرافياً وزمانياً أوسع حيث يمكن الوصول إلى خدماتها من أي مكان وفي أي وقت. كما تتيح الخدمة الإلكترونية إمكانيات التوثيق والتسجيل لم تكن متاحة في الخدمة التقليدية حيث يمكن حفظ جميع الاستفسارات والإجابات في قواعد بيانات إلكترونية مما يسهل عملية المراجعة والتقييم والتحسين المستمر.",

  {
   "q": "ناقش بالتفصيل الأهداف التربوية للمكتبة المدرسية كمركز لمصادر التعلم مع توضيح كيفية تحقيق كل هدف على حدة والتحديات التي تواجه تنفيذه.",
   "a": "تتصل الأهداف التربوية للمكتبة المدرسية بالأساليب المؤثرة في المنهج والبرنامج الدراسي وبنشاط الطالب والمدرس خارج المنهج، وتشمل عدة أهداف رئيسية يجب تحقيقها لتقديم خدمة مكتبية تربوية متكاملة تتناسب مع متطلبات العصر وتطلعات المجتمع المعاصر. أولاً: تشجيع القراءة الحرة بغرس وتنمية عادة القراءة والاطلاع لدى الطلاب، فالمكتبة مكملة للمنهج التعليمي والطفل يسعى بنفسه لقراءة القصص والكتب المصورة بعد تعلم مبادئ القراءة، وإذا ما وُفر للطفل الكتاب المناسب مادة وإخراجاً استطاع المعلم أن يستغل ميول الأطفال ويوجههم للقراءة التي تتفق مع مستوياتهم الذهنية وميولهم الفكرية، ويشجعهم على القراءة الحرة في السن المبكرة التي قد تستمر معهم طوال حياتهم. وتتنوع أنواع القراءة لتشمل القراءة التحصيلية الدراسية، وقراءة تجميع المعلومات لغرض واحد، والقراءة للمتعة الذهنية واستثمار أوقات الفراغ، والقراءة للتذوق الأدبي، والقراءة النقدية التحليلية. ثانياً: توجيه الطلاب إلى أساليب القراءة السليمة عن طريق الإرشاد القرائي السديد الذي يتطلب التعرف على مشكلات الطلاب القرائية وتذليلها، ودراسة ميولهم القرائية والاستجابة لتنميتها، وتوفير مجموعات من المواد المكتبية المتنوعة المناسبة لمستوياتهم القرائية المتدرجة من السهل إلى الصعب. ثالثاً: تعليم الطلاب كيفية استخدام المكتبة والاستفادة من خدماتها ومحتوياتها المتعددة وهذا يتطلب التعرف على المراجع والدوريات والمخطوطات والموسوعات والقواميس ونظام الفهرسة الوصفية والموضوعية والتصنيف وكيفية إعداد ورقة البحث وجمع المعلومات من المصادر المتعددة وتلخيصها وتنظيمها. رابعاً: توفير الكتب والمراجع وأوعية الاتصال ومصادر المعلومات والوسائل التعليمية اللازمة وفقاً لمعايير مناسبة. خامساً: الإسهام في إزالة الحواجز التقليدية بين المقررات الدراسية والأنشطة التربوية لتحقيق التكامل بين المناهج والأنشطة. سادساً: تنمية الاتجاهات والقيم الاجتماعية وإكساب الطلاب مهارات التعلم الذاتي والتفكير العلمي والابتكاري. سابعاً: خدمة البيئة المحيطة بالمدرسة وفتح المكتبة لجميع أفراد المجتمع المحلي في غير أوقات الدراسة. وأخيراً: تنمية مهارات وقدرات المعلمين من خلال توفير المصادر التربوية المناسبة لهم والمساهمة في نموهم المهني المستمر طوال حياتهم الوظيفية. ومن التحديات التي تواجه تنفيذ هذه الأهداف الحاجة إلى أمناء مكتبات مؤهلين علمياً ومهنياً وميزانيات كافية ومباني ملائمة وتكامل حقيقي بين المكتبة والمنهج الدراسي ووعي المجتمع بأهمية دور المكتبة المدرسية في العملية التربوية المتكاملة.",

  {
   "q": "تناول بالتحليل المعمق العلاقة بين تطور المناهج الدراسية ودور المكتبة المدرسية في ضوء الانتقال من التعليم التقليدي إلى التعليم الحديث مع بيان دور كل من أمين المكتبة والمعلم في هذه المنظومة المتكاملة.",
   "a": "شهدت المناهج الدراسية تحولاً جذرياً من النهج التقليدي إلى النهج الحديث مما أحدث تغييراً جوهرياً في دور المكتبة المدرسية ومكانتها في المنظومة التربوية. فالمنهج التقليدي في الدراسة كان يعتمد على اختزان المعلومات واسترجاعها عند تأدية الامتحانات، وكان يعتمد كثيراً على الكتاب المدرسي المقرر وحده مع التركيز على استظهار مادته من أجل تأدية الامتحان. وكان لكل مادة دراسية حدودها وقيودها المنفصلة عن المواد الأخرى، ولم تكن هذه المناهج تهتم بالجوانب المتعلقة بتكوين شخصية المتعلم ولم تسمح بتفاعل الطالب وإيجابيته في عملية التعلم مما أثر سلباً في كفاءة التعليم ونوعيته. أما الاتجاهات التعليمية الحديثة فقد غيّرت هذا المفهوم التقليدي تماماً وأصبح الاهتمام بالتعلم الذاتي واحتياجات الفرد وميوله ومشكلاته جزءاً أساسياً من العملية التربوية. تعمل المناهج الحديثة على تقسيم المواد الدراسية إلى وحدات وتربطها ببعضها لإزالة الحواجز المصطنعة بينها وبين الأنشطة المدرسية حتى لا تظل النظرة التقليدية إلى كل منها وكأنه كيان مستقل بذاته. وأصبح الكتاب المدرسي إطاراً عاماً يحدد الاتجاهات والمفاهيم الأساسية للمادة الدراسية ويترك للطالب حرية البحث والتنقيب عن المعلومات بنفسه من المصادر التعليمية المتاحة بالمكتبة بإشراف أمين المكتبة وبالتعاون مع أستاذ المادة الدراسية. في هذه المنظومة المتكاملة يبرز دور جديد لأمين المكتبة الذي يتعاون مع المعلم في تدريب الطلاب على القراءة والفهم والتلخيص والشرح والتحليل وإعداد التقارير والتعبير بأسلوب سليم يساير العصر. هذا الدور الإيجابي يتكامل مع دور المعلم في عمليات التعليم والتعلم ويجعل من المكتبة شريكاً حقيقياً في العملية التربوية وليست مجرد مرفق ثانوي ملحق بالمدرسة. وتسهم الأنشطة التربوية في تحقيق أهداف متعددة منها تمكين الطلاب من ممارسة النشاط الفردي والجماعي تبعاً لميولهم وقدراتهم، وتدعيم المناهج الدراسية بإزالة الحواجز بين المواد المختلفة، والانتفاع بأوقات الفراغ واستثمارها في أعمال جيدة، واكتساب خبرات ومهارات في حل المشكلات في جو تربوي ديمقراطي خارج حجرات الدراسة. وكل هذا يتم من خلال الجمعيات المدرسية تحت إشراف المدرسين والمتخصصين بالتعاون مع المكتبة المدرسية لتدعيم هذه الأنشطة بتوفير كل ما يلزمها من الأوعية المتاحة وبذلك يتحقق التكامل الحقيقي بين المنهج الدراسي والأنشطة التربوية ودور المكتبة المدرسية كمركز لمصادر التعلم.",

   "q": "قدم دراسة تحليلية شاملة لأهداف ووظائف المكتبات الجامعية في ضوء امتداد البرنامج التعليمي والبحثي من السنة الأولى حتى الدكتوراه مع بيان المتطلبات المؤسسية والبشرية لتحقيق هذه الوظائف بكفاءة.",
   "a": "لما كان البرنامج التعليمي والبحثي في الجامعة يمتد من السنة الأولى الجامعية حتى الدكتوراه فإن المكتبة الجامعية مطالبة بتقديم مصادرها وخدماتها بما يتلاءم مع هذا الامتداد الواسع من المستويات التعليمية المتدرجة والمتنوعة. كما يجب أن تستجيب لبرامج الجامعة المتعلقة بالتعليم المستمر وبرنامج النشر والاهتمام بمطبوعات الجامعة باعتبارها مركز إيداع لهذه المطبوعات ومركز التعريف والترويج لها. ولتحقيق هذه الأهداف يجب أن تحصل المكتبة على مجموعات وكتب في مختلف المجالات العلمية من أحدث الطبعات فضلاً عن اقتناء المواد ذات القيمة التاريخية والمراجع العامة والتخصصية والمواد التي تخدم المناهج الدراسية والبحوث بلغات متعددة خصوصاً اللغات التي يستخدمها أعضاء هيئة التدريس والطلاب. كما يجب الاهتمام بالحصول على مجموعات الكتب والدوريات والوثائق والتقارير والنشرات العلمية والميكروفورم والشرائط وغيرها من أشكال المواد المكتبية والتجهيزات والآلات اللازمة للخدمة المكتبية المتكاملة. وتحقق المكتبة الجامعية عدة وظائف أساسية تشمل: اختيار المواد المكتبية المختلفة والحصول عليها بمختلف الوسائل وهذه تشمل الكتب والدوريات والمخطوطات والميكروفورم والأفلام والخرائط وغيرها من المواد، وتنظيم وفهرسة تلك المواد وإعداد التسجيلات الببليوجرافية التي تحدد أماكنها بدقة، وتسجيل وترقيم المواد لإثبات ملكيتها للجامعة وتحديد مصدر الشراء والاقتناء، وتجليد وصيانة المواد لضمان استخدامها للأجيال القادمة وحفظ التراث العلمي، وإعارة المواد وإتاحتها للقراء والمجتمع الأكاديمي عدا بعض المراجع والمواد الخاصة، وتقديم خدمات التعليم الفردي أو الجماعي للطلاب وإصدار النشرات الإرشادية، وتوفير أماكن للقراءة والدراسة الخاصة بالباحثين وطلاب الدراسات العليا، وإرساء قواعد التعاون مع المكتبات والهيئات الأخرى التي تقتني مجموعات علمية هامة يمكن أن يستفيد منها الباحثون في مختلف التخصصات. وتمتاز مكتبة الجامعة عن مكتبة الكلية بتقديم مطبوعات في مجالات أوسع وما يخدم الدراسات العليا والبرامج المهنية المتقدمة. ومن هنا فيقال بأن مكتبة البحث في البلاد المتقدمة تتميز بعمق تخصصاتها واتساع مصادرها، وتتميز مكتبة الجامعة أيضاً بأنها مكتبة بحثية بامتياز، وكمكتبة بحث تتطلب نسبة أعلى من المجلدات لكل طالب وقد تصل إلى أربعة ملايين مجلد في البلاد المتقدمة وتقتني المصادر الثانوية كالدوريات الكشفية والمستخلصات ومصادر المراجعات والمواد المشروحة التي تغطي موضوعات محددة.",

   "a": "تستجيب مكتبات المعاهد المتوسطة لاحتياجات خريجي المدارس الثانوية الذين يدرسون لمدة سنتين بعد الثانوية العامة للحصول على مهارات مهنية وفنية في المجالات التعليمية والتجارية والصناعية والزراعية. يجب أن تخطط هذه المكتبات مجموعتها لتشمل مختلف الموضوعات التي يقوم المعهد بتدريسها بحيث تستجيب لاحتياجات الطلاب من حيث أعمارهم وخلفياتهم الثقافية ومستوياتهم الفكرية وأهدافهم المهنية. كما ينبغي أن تشمل مجموعاتها أشكالاً مختلفة كالكتب والدوريات والنشرات والمصادر التعليمية والوسائل السمعية والبصرية والأدوات المرجعية والببليوجرافية والمواد الترويجية للقراءة الحرة التي تشجع عادة المطالعة. ويجب أن تقدم برنامجاً رسمياً أو غير رسمي في تعلم استخدام المكتبة والمراجع وتشجيع الاطلاع عن طريق المعارض وندوات مناقشة الكتب وغيرها من الأنشطة الثقافية الداعمة. ويجب أن يكون أمين مكتبة المعهد ذا خلفية علمية عريضة وعلى دراية كافية بالإنتاج الفكري في المجالات الموضوعية التي يغطيها المعهد حتى يسهم بدور إيجابي في اختيار المواد المناسبة ويتمكن من خدمة الطلاب والأساتذة بكفاءة عالية. أما مكتبات الكليات فتخدم طلاب البكالوريوس لمدة أربع سنوات وقد تضم الكلية من بضع مئات إلى عشرة آلاف طالب. شهدت هذه المكتبات تطوراً كبيراً حيث ركزت في البداية على الحصول على المواد وتخزينها وكان الكتاب المقرر هو الوسيلة التعليمية الرئيسية والوحيدة تقريباً. لكن في الوقت الحاضر تطورت لتشجيع استخدام المصادر التعليمية المتعددة وتقديم خدمات لساعات أطول وسياسات إعارة مرنة وتعليم الطلاب استخدام المكتبة والفهارس والمراجع وإعداد البحوث. وفرض التطور العلمي والتكنولوجي المعاصر تقديم دراسات تخصصية متعددة وتطوير المناهج والاستفادة من المصادر المطبوعة وغير المطبوعة. ويجب أن يكون الأمناء المهنيون ذوي خلفية علمية عريضة مع تخصص موضوعي ومقدرة لغوية في لغة أجنبية والإحاطة بتطورات التعليم الجامعي والمناهج وطرق التدريس حتى يكونوا قادرين على الإسهام الإيجابي في العملية التعليمية. ويتلاءم التنظيم الإداري مع حجم الطلاب وأعضاء هيئة التدريس وحجم الدراسات والمجموعات والخدمات. فالفارق بين النمط القديم والحديث هو التحول الجذري من مفهوم التخزين والحفاظ إلى مفهوم الاستخدام الفعال والوصول الحر للمعلومات مما يزيد من فاعلية العملية التعليمية والبحثية في    "a": "تتعدد التنظيمات الإدارية لمكتبة الجامعة لكن الاتجاه العام يرتكز على نمطين أساسيين. النمط الأول هو المكتبة الجامعية المركزية التي تهتم بصفة أساسية بخدمة طلاب الدراسات العليا وأعضاء هيئة التدريس والباحثين مع الاهتمام باقتناء المراجع العامة والتخصصية وتقديم خدمات التصوير المركزي والوسائل السمعية والبصرية وخدمات المراجع والمعلومات. والنمط الثاني هو مكتبات لخدمة طلاب المرحلة الجامعية الأولى التي قد تحتل مبانٍ مستقلة أو تكون داخل المكتبة المركزية مع السماح لطلاب المرحلة الأولى باستخدام المكتبة المركزية أيضاً. وتتبنى بعض الجامعات فكرة مكتبة واحدة جامعية مركزية تضم جميع أشكال المقتنيات والوسائل السمعية البصرية وخدمات التصوير والحاسب الآلي مع توفير تسهيلات كقاعات الاطلاع والكتب المحجوزة والاستعارات. ولا يمنع هذا التنظيم الأقسام العلمية من امتلاك مكتباتها المستقلة للحصول على مجموعات متفرقة كالرسائل العلمية والتقارير الفنية والمقالات أو أجزاء من الموسوعات المتخصصة. وتتأثر التنظيمات الإدارية بعوامل عديدة أهمها حجم الطلاب وأعضاء هيئة التدريس بمختلف كليات الجامعة والموقع الجغرافي للكليات وتوفر المباني الملائمة والأمناء المهنيين المؤهلين. وفي مجال الخدمات تقدم المكتبة الجامعية خدمات إرشاد الطلاب وإحاطتهم بالببليوجرافيات المتوفرة في مجالات دراستهم وتعليمهم كيفية استخدام المصادر والمراجع وتعريف أعضاء هيئة التدريس بالإنتاج الفكري المتخصص. وتقدم أيضاً خدمات الترجمة والتصوير والطباعة والمشاركة في الخدمات الببليوجرافية التعاونية. ويجب أن يكون مدير المكتبة قادراً على تطوير وإدارة الحياة الفكرية والعلمية للجامعة وتفسير برنامج المكتبة لضمان التمويل المادي والأدبي. كما ينبغي أن يكون الأمناء ذوي خلفية تعليمية عريضة مع تخصص في أحد الموضوعات العلمية أو اللغات أو معرفة أشكال معينة من المواد كالتقارير العلمية وبراءات الاختراع والوثائق الفنية أو في إرشاد القراء وطرق البحث العلمي المتخصصة وأن يكونوا على درجة عالية من الكفاية المهنية والمشاركة الفعالة في تطوير الخدمات الببليوجرافية التعاونية على المستوى المحلي والدولي. وتواجه هذه المكتبات تحديات تنتج من نمو المؤسسات وزيادة الطلاب والبرامج البحثية التي تتطلب مصادر متنوعة يصعب الحصول عليها لندرتها أو ارتفاع أثمانها مما يستلزم المزيد من الاعتمادات المالية والتوسعات والموظفين المؤهلين ذوي التخصصات الموضوعية المتنوعة التي تحتاجها المكتبة الأكاديمية لتقديم خدماتها بكفاءة وفعالية عالية.",

   "q": "ناقش بالتفصيل أشكال الملفات المستخدمة في مشروعات الرقمنة في مصر مع بيان مزايا وعيوب كل شكل وموقفه من توصيات أفضل الممارسات الدولية، مع التركيز على أشكال TIFF وPDF وXML.",
   "a": "تتعدد أشكال الملفات المستخدمة في مشروعات الرقمنة المصرية وتتنوع بحسب طبيعة المحتوى والمرحلة التي يمر بها المنتج الرقمي. ويمكن تصنيف الملفات من حيث الشكل إلى ملفات نصية وملفات غير نصية تشمل برمجيات ووسائط متعددة وقواعد بيانات. وتوصي أفضل الممارسات الدولية بإنشاء ملف أساسي واحد عالي الجودة وغير مضغوط يصلح لجميع الأغراض ويوصى باستخدام صيغة TIFF لهذا الغرض لقدرتها على التقاط التفاصيل الدقيقة خاصة في المخطوطات التاريخية المكتوبة بالقلم الرصاص والحبر والكتابة اليدوية. إلا أن الدراسة الميدانية كشفت عن ضعف استخدام TIFF في مصر حيث لم تستخدمه إلا ثلاثة مشروعات من إجمالي المشروعات التي تتعامل مع نصوص، ويرجع ذلك إلى أن ثلاثة مشروعات تتعامل مع نصوص حديثة حيث الأولوية ترجع للمحتوى نفسه. أما صيغة PDF فقد كثر استخدامها في إتاحة المصادر الرقمية لعدة مزايا تشمل الارتباطات التشعبية داخل النص وبين الوثائق ومواقع الإنترنت، وإمكانية تصغير الصفحات عند العرض، وتضمين الخطوط مع الوثيقة لضمان عرضها بالخطوط نفسها دون التقيد بوجودها على حاسب المستفيد، وإمكانة التكشيف والبحث، وتحميل صفحة صفحة، وصغر حجم الملف الناتج عن الضغط. ومن منظور الناشرين تتميز بحماية الملف بكلمات السر وتقييد الطباعة والنسخ. أما عيوبها فتشمل عدم ملاءمتها للحفظ التاريخي بسبب التطوير المستمر للغة التوصيف من قبل الشركة، وعدم إتاحة بنية الملف الداخلية. وعالجت كثير من المشروعات هذه المشكلة باختزان المحتوى في صيغة TIFF أو XML ثم تحويله إلى PDF للعرض فقط. وفيما يتعلق بصيغة XML فهي لغة تحديد مبسطة شاملة تتميز بقدرتها على عكس بنية مكونات الوثيقة مما يحسن عمليات استرجاع النصوص الكاملة، إلا أن عائقها الرئيسي هو عدم توفر برمجيات عرض مجانية لها مما يستدعي التحويل إلى HTML. وبالنسبة للوسائط المتعددة اتفقت المشروعات المصرية مع التوصيات الدولية في أشكال الملفات، مع التمييز بين ملف التحميل الذي يجب إنزاله كاملًا وملف التشغيل المتدفق الذي يُقطع إلى حزم تُشغل فورًا. واستخدم مشروع واحد فقط صيغة PSD الخاصة بفوتوشوب كملفات مصدرية لما تتميز به من إمكانات رسومية تعتمد على مفهوم تركيب الطبقات. وقد تبين من المقارنة بين جدول أشكال الملفات المستخدمة في المشروعات المصرية والتوصيات الدولية أن ثلاثة مشروعات فقط استخدمت صيغة TIFF كملف أساسي على خلاف التوصيات الدولية. كما أن نصف المشروعات اختلفت فيها أشكال ملفات المسح عن أشكال ملفات العرض ولم تستخدم أي منها خاصية التحويل الآني للصيغة التي يرغب فيها المستفيد. واستخدم مشروع واحد فقط صيغة PSD الخاصة ببرنامج فوتوشوب لما تتميز به من إمكانات رسومية تعتمد على تركيب الطبقات. واعتمد مشروع الشبكة القومية للمعلومات في مراحل مبكرة على صيغة وسيطة قبل التحويل المباشر. كما أن كثرة استخدام صيغة PDF في إتاحة المصادر الرقمية يرجع إلى التطابق الكامل بين الملف والشكل المطبوع وهو أمر بالغ الأهمية للمستفيد في المصادر الأكاديمية.",

   "q": "تناول بالتفصيل مشروعات الرقمنة في مصر من حيث أنواعها وأهدافها وأسس اختيار المصادر فيها وسياساتها في التعامل مع الأصول بعد الرقمنة، مع التحليل المقارن بين هذه المشروعات.",
   "a": "شملت الدراسة الميدانية ثمانية مشروعات رقمنة في مصر تنوعت مصادرها وأهدافها وأساليب تنفيذها بشكل ملحوظ. فدار الكتب المصرية ركزت على رقمنة المخطوطات باعتبارها المؤسسة الأولى المعنية بحفظ التراث الوطني المصري، واعتمدت على التعاون مع جهات خارجية منها مركز معلومات مجلس الوزراء ومركز توثيق التراث الحضاري ومؤسسة الأهرام للقيام بعمليات الرقمنة وتطويرها. ومكتبة الإسكندرية أنشأت مكتبة المخطوطات الرقمية بسياسة أكثر وضوحًا في الصيانة والحفظ حيث تحدد الأولويات وفق الحالة المادية للمخطوط أولاً ثم الأهمية النسبية للمحتوى. والمكتبة القومية الزراعية رقنت الدوريات العلمية المتخصصة في مجال الزراعة وحصلت على تراخيص رقمنة من المؤسسات الناشرة بموجب اتفاقيات رسمية. ومكتبة المنظمة العربية للتنمية الإدارية رقنت الاستشهادات المرجعية في مجال الإدارة بتمويل عربي محدد الميزانية سلفًا من الجهة المانحة واعتمدت على طرح ممارسة تنافسية لتعيين شركة متخصصة بالرقمنة وهو المشروع الوحيد الذي حدد أولوياته طبقًا للميزانية والبرمجيات المتاحة. ومكتبة مبارك العامة أنشأت مكتبة الفيديو الرقمية لندواتها وفعالياتها وليس لديها خطة تسمية محددة للملفات الناتجة. والشبكة القومية للمعلومات بأكاديمية البحث العلمي نفذت مشروع ستارز لرقمنة النصوص الكاملة للدوريات المصرية كامتداد طبيعي لنشاط الشبكة في قاعدة بيانات الدليل الموحد للدوريات. ومركز توثيق التراث الحضاري نفذ مشروعات متنوعة في رقمنة التراث المصري وتنوعت أشكال مصادره بين المخطوطات والكتب والصور والخرائط والمواد السمعية والمواد ثلاثية الأبعاد. ومركز الدراسات والموسوعات الإسلامية بالمجلس الأعلى للشئون الإسلامية ركز على رقمنة الكتب المطبوعة المتعلقة بالإرشاد والدعوة الإسلامية وفق كثافة طلب المستفيدين. وبالنسبة لسياسة التعامل مع الأصول بعد الرقمنة وجد أن مشروعين استبعدا المطبوع وأتاحا النسخة الرقمية فقط مقابل ستة مشروعات أتاحت النسختين المطبوعة والرقمية معًا. وتباينت أساليب تسمية الملفات بين المشروعات بشكل واضح يعكس غياب معايير موحدة للتسمية في مصر. وتجدر الإشارة إلى أن سياسة التعامل مع الأصول بعد الرقمنة تمثل جانبًا مهمًا من التخطيط في مشروعات الرقمنة حيث وجد أن مشروعين فقط استبعدا المطبوع وأتاحا النسخة الرقمية فقط مقابل ستة مشروعات أتاحت النسختين المطبوعة والرقمية معًا. ويعكس هذا التباين اختلاف الفلسفات المؤسسية بين مرافق المعلومات المصرية فيما يخص العلاقة بين الشكل التقليدي والرقمي للمصدر. كما أن تباين أساليب تسمية الملفات بين المشروعات يكشف عن غياب معايير موحدة للتسمية في مصر حيث يستخدم كل مشروع أسلوبًا مختلفًا يعكس ظروفه الخاصة وموارده التقنية دون التنسيق مع غيره من المشروعات.",

   "a": "تتبلور رؤية المنظومة المقترحة للمكتبات الرقمية في مصر في إتاحة المحتوى الرقمي من خلال تأسيس شبكة وطنية يتقاسم أطرافها مسئوليات جمع وضبط وإتاحة هذا المحتوى وصيانته واختزانه. ولا تسعى المنظومة أن تكون مجرد فهرس موحد أو قاعدة بيانات مركزية، بل مجموعة مستودعات محتوى موزعة تدعمها بوابات الولوج الشاملة والمتخصصة بأدوات بحث واسترجاع متقدمة. وقد استرشد الباحث بالعشرة تحديات التي حددها فريق برنامج المكتبة الرقمية الوطنية بمكتبة الكونجرس المقسمة على خمسة محاور: بناء المصادر وتشمل تطوير تقنيات الرقمنة وتصميم أدوات البحث وأدوات تحسين الفهرسة والوصف من خلال إسهامات المستخدمين، والتشغيل البيني عبر بناء البروتوكولات والمعايير، والملكية الفكرية بتحديد القضايا القانونية، والإتاحة الفعالة بتكامل المصادر الرقمية والتقليدية وتعميم الفائدة على مختلف فئات المستفيدين، ومساندة المصادر بتطوير النماذج الاقتصادية. وبناء على ذلك حدد الباحث أحد عشر هدفًا ومهمة للمنظومة تشمل وضع الخطط الاستراتيجية وتقنين الممارسات وإصدار الأدلة الاسترشادية واستكمال البنية الأساسية للمعلومات وإصدار المعايير للتبادل والتشغيل البيني وتوفير الدعم المالي وتنسيق جهود الرقمنة وتطبيق أساليب الحفظ الرقمي وتشجيع نشر المصادر الرقمية وتنمية الموارد البشرية ووضع معايير تقييم الأداء ودعم البحث والتطوير. وفيما يخص الجهاز الإداري أوصى المؤتمر العلمي بجامعة القاهرة 1997 بإنشاء مجلس وطني للمعلومات مقره دار الكتب المصرية، وفي ظل غيابه يقترح الباحث مشروع المبادرة المصرية للمكتبات الرقمية بمجلس أعلى يتبع رئاسة الجمهورية أو مجلس الوزراء. وتتوزع المسئوليات على ستة قطاعات: قطاع حفظ وصيانة التراث ويضم دار الكتب ومكتبة الإسكندرية ووزارة الأوقاف ومركز توثيق التراث، وقطاع التعليم العالي والبحث العلمي ويشمل شبكة المجلس الأعلى للجامعات والمكتبات الجامعية والمكتبة القومية الزراعية والشبكة القومية للمعلومات، وقطاع الثقافة بالمكتبات العامة ومكتبات جمعية الرعاية المتكاملة، وقطاع النظم والاتصالات بوزارة الاتصالات وتكنولوجيا المعلومات، وقطاع المعايير والمواصفات بلجان التوثيق بوزارة الصناعة، والقطاع التجاري باتحاد الناشرين وشركات النظم الآلية. وبناء على الرؤية المقترحة والتحديات السابقة أمكن تحديد أحد عشر هدفًا ومهمة للمنظومة تشمل وضع الخطط الاستراتيجية والإجرائية لبناء وتطوير مشروعات المكتبة الرقمية، وتقنين الممارسات بين المكتبات الرقمية عن طريق إصدار أدلة العمل الاسترشادية والتقارير السنوية، واستكمال بناء وتطوير البنية الأساسية للمعلومات بما في ذلك جانب المستفيد، وإصدار المعايير اللازمة لتبادل المصادر الرقمية والتشغيل البيني، وتوفير الدعم المالي لبناء وتطوير المكتبات الرقمية، وتنسيق جهود رقمنة مصادر المعلومات وإتاحتها على المستوى الوطني، وتطبيق أساليب الحفظ والاختزان الرقمي لصيانة التراث الرقمي الوطني والدعوة لإنشاء الأرشيف الوطني للمصادر الرقمية، وتشجيع نشر المصادر الرقمية وإتاحتها مع حماية حقوق الملكية الفكرية، وتنمية الموارد البشرية القادرة على إدارة مشروعات المكتبة الرقمية والرقابة على برامج التأهيل والتدريب واعتمادها، ووضع معايير تقييم الأداء وتقويمه وطرق ضبط الجودة، ودعم البحث والتطوير في القضايا ذات الصلة بالبيئة المحلية المصرية والإعلان عن برامج بحثية ممولة.",

// ─── Web Audio API Sound Effects ───
const SoundFX=(()=>{let ctx;function getCtx(){if(!ctx)try{ctx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}return ctx}
return{
  correct(){const c=getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.connect(g);g.connect(c.destination);const now=c.currentTime;o.frequency.setValueAtTime(523,now);o.frequency.setValueAtTime(659,now+0.1);o.frequency.setValueAtTime(784,now+0.2);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.5);o.start(now);o.stop(now+0.5)},
  wrong(){const c=getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.connect(g);g.connect(c.destination);const now=c.currentTime;o.frequency.setValueAtTime(180,now);o.frequency.setValueAtTime(120,now+0.15);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.3);o.start(now);o.stop(now+0.3)},
  levelUp(){const c=getCtx();if(!c)return;[523,587,659,784,880,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.connect(g);g.connect(c.destination);const t=c.currentTime+i*0.12;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.3);o.start(t);o.stop(t+0.3)})},
  achieve(){const c=getCtx();if(!c)return;[1200,1600,2000,2400,2000,2400,2800].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.connect(g);g.connect(c.destination);const t=c.currentTime+i*0.08;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.2);o.start(t);o.stop(t+0.2)})},
  click(){const c=getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.connect(g);g.connect(c.destination);const now=c.currentTime;o.frequency.setValueAtTime(800,now);g.gain.setValueAtTime(0.08,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.05);o.start(now);o.stop(now+0.05)}
}})();

function addXP(a,reason){
  state.xp+=a;
  const n=state.level*100;
  if(state.xp>=n){state.xp-=n;state.level++;showToast('🎉 وصلت المستوى '+state.level+'!','x');fireConfetti();SoundFX.levelUp();checkAch()}
  if(reason){showToast('⭐ +'+a+' XP — '+reason,'x')}
  updXP();save()
}

function updXP(){
  const n=state.level*100;
  $('#xLv').textContent=state.level;
  $('#xLvT').textContent=state.level;
  $('#xP').textContent=state.xp;
  $('#xN').textContent=n;
  $('#xF').style.width=(state.xp/n*100)+'%';
}

function checkAch(){
  const c={
    first_q:()=>state.totalAnswered>=1,
    streak5:()=>state.correctStreak>=5,
    streak10:()=>state.correctStreak>=10,
    mcq20:()=>Object.keys(state.answeredMcq).length>=20,
    tf20:()=>Object.keys(state.answeredTf).length>=20,
    all_ch:()=>visitedCh.size>=6,
    level5:()=>state.level>=5,
    level10:()=>state.level>=10,
    xp500:()=>(state.level-1)*100+state.xp>=500,
    essay10:()=>(state.essayViewed||0)>=10
  };
  let nw=false;
  ACHS.forEach(a=>{if(!state.achievements[a.id]&&c[a.id]&&c[a.id]()){state.achievements[a.id]=true;nw=true;showToast('🏆 إنجاز جديد: '+a.title,'x');SoundFX.achieve();fireConfetti()}});
  if(nw)save()
}

}

function fireConfetti(){
  const cv=$('#confetti'),cx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const ps=[],cols=['#6c5ce7','#a29bfe','#fd79a8','#00b894','#fdcb6e','#e17055','#55efc4','#ff6b6b'];
  for(let i=0;i<80;i++)ps.push({x:Math.random()*cv.width,y:Math.random()*cv.height-cv.height,vx:(Math.random()-.5)*8,vy:Math.random()*3+2,c:cols[Math.floor(Math.random()*cols.length)],s:Math.random()*6+3});
  let f=0;
  (function anim(){cx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;cx.fillStyle=p.c;cx.fillRect(p.x,p.y,p.s,p.s)});f++;if(f<80)requestAnimationFrame(anim);else cx.clearRect(0,0,cv.width,cv.height)})()
}

function rChaps(){
  return `<div class="page"><div class="stit"><span>📖</span> الفصول الدراسية</div>
  ${APP_DATA.chapters_meta.map(ch=>`<div class="card ch-card" style="--ch-color:${ch.color}" onclick="openCh('${ch.key}')"><div class="ch-badge" style="background:${ch.color}">${ch.full_title}</div><h3 style="font-size:1rem;font-weight:700;margin-bottom:8px">${ch.title}</h3><p style="font-size:.82rem;color:var(--text2)">${(APP_DATA.chapter_texts[ch.key]||'').substring(0,120)}...</p></div>`).join('')}</div>`;
}
function formatChapText(txt,color){
  if(!txt)return '<div class="ch-text">لا يوجد محتوى متاح</div>';
  // Clean up noise from OCR
  txt=txt.replace(/["""]+/g,'').replace(/["""]+/g,'').replace(/٠١|٠٢|٠٣|٠٤|٠٥|٠٦|٠٧|٠٨|٠٩|٠١٠/g,'').replace(/^(صفر|واحد|اثنان|ثلاثة|أربعة|خمسة|ستة|سبعة|ثمانية|تسعة)/gm,'').replace(/\n{3,}/g,'\n\n').trim();
  // Split into paragraphs
  const paras=txt.split(/\n\n+/).filter(p=>p.trim().length>0);
  let html='<div class="ch-toc"><h4>📑 فهرس المحتوى</h4><ul>';
  let sectionCount=0;
  paras.forEach(p=>{
    const clean=p.trim();
    // Detect section headers (short lines with Arabic words, possibly starting with keywords)
    const isHeader=clean.length<80&&!clean.startsWith(' ')&&(clean.match(/^[^\d\.\-\*]/)||clean.match(/^(الفصل|أولا|ثانيا|ثالثا|رابعا|خامسا|سادسا|سابعا|ثامنا|تاسعا|عاشرا|تمهيد|تقديم|خلفية|مقدمة)/i));
    if(isHeader&&sectionCount<12){
      html+='<li>'+clean.replace(/[٠-٩]/g,'').replace(/[\*\-]/g,'').substring(0,60)+'</li>';
      sectionCount++;
    }
  });
  html+='</ul></div>';
  // Render paragraphs with styling
  paras.forEach(p=>{
    const clean=p.trim().replace(/\n/g,' ').replace(/\s+/g,' ');
    if(!clean)return;
    // Section headers
    if(clean.length<80&&clean.match(/^(الفصل|أولا|ثانيا|ثالثا|رابعا|خامسا|سادسا|سابعا|ثامنا|تاسعا|عاشرا|تمهيد|تقديم|خلفية|مقدمة)/i)){
      html+='<div class="ch-section"><div class="ch-section-head">📌 '+clean+'</div>';
    } else if(clean.length<80&&clean.match(/^[^\d\.\-\*\s]/)){
      html+='<div class="ch-section"><div class="ch-subsection-head">🔹 '+clean+'</div>';
    } else if(clean.match(/^[-\*ـ]/)){
      const items=clean.split(/[-\*ـ]/).filter(s=>s.trim()).map(s=>'<div class="ch-list-item"><span class="ch-list-dot">◆</span><span>'+s.trim()+'</span></div>').join('');
      html+=items;
    } else if(clean.match(/^\d+\s*[.-]/)){
      const items=clean.split(/(?=\d+\s*[.-])/).filter(s=>s.trim()).map((s,i)=>{
        s=s.trim().replace(/^\d+\s*[.-]\s*/,'');
        return '<div class="ch-list-item"><span class="ch-list-num">'+(i+1)+'</span><span>'+s.trim()+'</span></div>';
      }).join('');
      html+=items;
    } else if(clean.match(/يُعرّ?ف|يُعتبر|تُعرف|المقصود|المقصود|مفهوم|تعريف|يهدف|تشمل|تتضمن/)){
      html+='<div class="ch-def-box">💡 '+clean+'</div>';
    } else if(clean.match(/يجب|مهم|أساسي|ضرور|حاسم|جوهري/)){
      html+='<div class="ch-info-box">📌 '+clean+'</div>';
    } else {
      html+='<div class="ch-text">'+clean+'</div>';
    }
  });
  return html;
}
function rChapDet(){
  const ch=APP_DATA.chapters_meta.find(c=>c.key===state.currentChapter);
  const txt=APP_DATA.chapter_texts[state.currentChapter]||'';
  return `<div class="page">
  <button class="bbtn" onclick="go('chapters')">← العودة للفصول</button>
  <div class="card" style="border-right:5px solid ${ch.color}"><div class="ch-badge" style="background:${ch.color}">${ch.full_title}</div><h3 style="font-size:1.1rem;font-weight:800;margin-bottom:12px">${ch.title}</h3></div>
  <div class="card"><div class="ctcontent">${formatChapText(txt,ch.color)}</div></div></div>`;
}

// ─── Summaries ───
function openSum(k){state.currentChapter=k;state.page='summaryDetail';renderNav();render()}
function rSums(){
  return `<div class="page"><div class="stit"><span>📋</span> ملخصات الفصول الشاملة</div>
  ${APP_DATA.chapters_meta.map(ch=>`<div class="card ch-card" style="--ch-color:${ch.color}" onclick="openSum('${ch.key}')"><div class="ch-badge" style="background:${ch.color}">${ch.full_title}</div><h3 style="font-size:1rem;font-weight:700;margin-bottom:6px">${ch.title}</h3><p style="font-size:.82rem;color:var(--text2)">ملخص شامل ومفصل - خط أميري</p></div>`).join('')}</div>`;
}
function rSumDet(){
  const ch=APP_DATA.chapters_meta.find(c=>c.key===state.currentChapter);
  let txt=APP_DATA.summaries_full[state.currentChapter]||'لا يوجد ملخص متاح';
  // Markdown-like formatting
  txt=txt.replace(/####\s*(.+)/g,'<h4 style="font-family:var(--font-content);font-size:.95rem;color:var(--accent);margin:14px 0 8px;font-weight:700">$1</h4>')
         .replace(/###\s*(.+)/g,'<h3 style="font-family:var(--font-content);font-size:1.05rem;color:var(--primary);margin:18px 0 10px;font-weight:700">$1</h3>')
         .replace(/##\s*(.+)/g,'<h2 style="font-family:var(--font-content);font-size:1.15rem;color:var(--primary);margin:22px 0 12px;font-weight:800">$1</h2>')
         .replace(/---/g,'<hr style="border:none;border-top:1px solid var(--border);margin:20px 0">')
         .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // Convert newlines to <br> within paragraphs
  txt=txt.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  return `<div class="page">
  <button class="bbtn" onclick="go('summaries')">← العودة للملخصات</button>
  <div class="card" style="border-right:5px solid ${ch.color}"><div class="ch-badge" style="background:${ch.color}">${ch.full_title}</div><h3 style="font-size:1.1rem;font-weight:800;margin-bottom:4px">${ch.title}</h3><p style="font-size:.8rem;color:var(--text2)">ملخص شامل مفصل</p></div>
  <div class="card"><div class="scontent"><p>${txt}</p></div></div></div>`;
}

// ─── MCQ ───
function gFMCQ(){const a=APP_DATA.mcqs;return state.chapterFilter==='all'?a:a.filter(q=>q.ch===state.chapterFilter)}
function rMCQ(){
  const f=gFMCQ();
  if(state.mcqIndex>=f.length)state.mcqIndex=f.length-1;
  if(state.mcqIndex<0)state.mcqIndex=0;
  if(!f.length)return noQ('لا توجد أسئلة في هذا الفصل');
  const q=f[state.mcqIndex],qid=q.ch+'_'+state.mcqIndex,ans=state.answeredMcq[qid];
  const ch=APP_DATA.chapters_meta.find(c=>c.key===q.ch);
  return `<div class="page">
  <div class="stit"><span>🧠</span> أسئلة الاختيار المتعدد</div>
  ${rFilter('mcq')}
  <div class="qc">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span class="qn">سؤال ${state.mcqIndex+1} من ${f.length}</span>
      <span class="qtag" style="background:${ch?ch.color:'var(--primary)'}">${ch?ch.full_title:''}</span>
    </div>
    <div class="qt">${q.q}</div>
    <div>${q.o.map((o,i)=>{
      let cls='opt';
      if(ans!==undefined){cls+=' dis';if(i===q.c)cls+=' ok';else if(i===ans&&i!==q.c)cls+=' no'}
      return `<button class="${cls}" onclick="ansMCQ(${i},'${qid}')" ${ans!==undefined?'disabled':''}>${o}</button>`}).join('')}</div>
    ${ans!==undefined?`<div class="exp"><strong>الشرح:</strong> ${q.e}</div>`:''}
  </div>
  <div class="nrow">
    <button class="btn btno" onclick="pMCQ()" ${state.mcqIndex===0?'disabled':''}>السابق</button>
    <span style="font-size:.8rem;color:var(--text2)">${Math.round((state.mcqIndex+1)/f.length*100)}%</span>
    <button class="btn btnp" onclick="nMCQ()" ${state.mcqIndex>=f.length-1?'disabled':''}>التالي</button>
  </div></div>`;
}
function ansMCQ(i,qid){
  const f=gFMCQ(),q=f[state.mcqIndex];
  if(state.answeredMcq[qid]!==undefined)return;
  state.answeredMcq[qid]=i;state.totalAnswered++;
  if(i===q.c){state.totalCorrect++;state.correctStreak++;addXP(10,'إجابة صحيحة');showToast('✓ إجابة صحيحة! +10 XP','s');SoundFX.correct();fireConfetti()}
  else{state.correctStreak=0;addXP(2,'محاولة');showToast('✗ إجابة خاطئة','e');SoundFX.wrong()}
  checkAch();render()
}
function pMCQ(){if(state.mcqIndex>0){state.mcqIndex--;render()}}
function nMCQ(){const f=gFMCQ();if(state.mcqIndex<f.length-1){state.mcqIndex++;render()}}

// ─── TF ───
function gFTF(){const a=APP_DATA.tf;return state.chapterFilter==='all'?a:a.filter(q=>q.ch===state.chapterFilter)}
function rTF(){
  const f=gFTF();
  if(state.tfIndex>=f.length)state.tfIndex=f.length-1;
  if(state.tfIndex<0)state.tfIndex=0;
  if(!f.length)return noQ('لا توجد أسئلة في هذا الفصل');
  const q=f[state.tfIndex],qid=q.ch+'_tf_'+state.tfIndex,ans=state.answeredTf[qid];
  const ch=APP_DATA.chapters_meta.find(c=>c.key===q.ch);
  return `<div class="page">
  <div class="stit"><span>✅</span> أسئلة صح أو خطأ</div>
  ${rFilter('tf')}
  <div class="qc">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span class="qn">سؤال ${state.tfIndex+1} من ${f.length}</span>
      <span class="qtag" style="background:${ch?ch.color:'var(--primary)'}">${ch?ch.full_title:''}</span>
    </div>
    <div class="qt">${q.q}</div>
    <div class="tfrow">
      <button class="tfbtn ${ans===true?'ok':''} ${ans!==undefined?'dis':''}" onclick="ansTF(true,'${qid}')" ${ans!==undefined?'disabled':''}>صح ✔</button>
      <button class="tfbtn ${ans===false?'ok':''} ${ans!==undefined?'dis':''}" onclick="ansTF(false,'${qid}')" ${ans!==undefined?'disabled':''}>خطأ ✘</button>
    </div>
    ${ans!==undefined?`<div class="exp"><strong>الشرح:</strong> ${q.e}</div>`:''}
  </div>
  <div class="nrow">
    <button class="btn btno" onclick="pTF()" ${state.tfIndex===0?'disabled':''}>السابق</button>
    <span style="font-size:.8rem;color:var(--text2)">${Math.round((state.tfIndex+1)/f.length*100)}%</span>
    <button class="btn btnp" onclick="nTF()" ${state.tfIndex>=f.length-1?'disabled':''}>التالي</button>
  </div></div>`;
}
function ansTF(v,qid){
  const f=gFTF(),q=f[state.tfIndex];
  if(state.answeredTf[qid]!==undefined)return;
  state.answeredTf[qid]=v;state.totalAnswered++;
  if(v===q.c){state.totalCorrect++;state.correctStreak++;addXP(8,'إجابة صحيحة');showToast('✓ إجابة صحيحة! +8 XP','s');SoundFX.correct();fireConfetti()}
  else{state.correctStreak=0;addXP(2,'محاولة');showToast('✗ إجابة خاطئة','e');SoundFX.wrong()}
  checkAch();render()
}
function pTF(){if(state.tfIndex>0){state.tfIndex--;render()}}
function nTF(){const f=gFTF();if(state.tfIndex<f.length-1){state.tfIndex++;render()}}

// ─── Essays ───
function gFE(){let a=state.essayType==='se'?APP_DATA.se:APP_DATA.le;return state.chapterFilter==='all'?a:a.filter(q=>q.ch===state.chapterFilter)}
function rEssays(){
  const f=gFE();
  if(!f.length)return noQ('لا توجد أسئلة في هذا الفصل');
  const idx=state.essayType==='se'?state.seIndex:state.leIndex;
  const ri=Math.min(idx,f.length-1);
  const q=f[ri];
  const ch=APP_DATA.chapters_meta.find(c=>c.key===q.ch);
  return `<div class="page">
  <div class="stit"><span>✍️</span> الأسئلة المقالية</div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="chip ${state.essayType==='se'?'act':''}" onclick="swET('se')">أسئلة قصيرة (${APP_DATA.se.length})</button>
    <button class="chip ${state.essayType==='le'?'act':''}" onclick="swET('le')">أسئلة مطولة (${APP_DATA.le.length})</button>
  </div>
  ${rFilter('essay')}
  <div class="qc">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span class="qn">سؤال ${ri+1} من ${f.length}</span>
      <span class="qtag" style="background:${ch?ch.color:'var(--primary)'}">${ch?ch.full_title:''}</span>
    </div>
    <div class="eq">${q.q}</div>
    <button class="sa-btn" onclick="togEssay()">
      ${state.showEssayAnswer?'👁️ إخفاء الإجابة':'📝 عرض الإجابة النموذجية'}
    </button>
    ${state.showEssayAnswer?`<div class="sa-ans">${q.a}</div>`:''}
  </div>
  <div class="nrow">
    <button class="btn btno" onclick="pEs()" ${ri===0?'disabled':''}>السابق</button>
    <span style="font-size:.8rem;color:var(--text2)">${Math.round((ri+1)/f.length*100)}%</span>
    <button class="btn btnp" onclick="nEs()" ${ri>=f.length-1?'disabled':''}>التالي</button>
  </div></div>`;
}
function togEssay(){
  if(!state.showEssayAnswer){state.essayViewed=(state.essayViewed||0)+1;addXP(5,'مراجعة إجابة مقالية');SoundFX.click();checkAch()}
  state.showEssayAnswer=!state.showEssayAnswer;render()
}
function swET(t){state.essayType=t;state.seIndex=0;state.leIndex=0;state.showEssayAnswer=false;render()}
function pEs(){if(state.essayType==='se'&&state.seIndex>0)state.seIndex--;else if(state.essayType==='le'&&state.leIndex>0)state.leIndex--;state.showEssayAnswer=false;render()}
function nEs(){if(state.essayType==='se'){const f=gFE();if(state.seIndex<f.length-1)state.seIndex++}else{const f=gFE();if(state.leIndex<f.length-1)state.leIndex++}state.showEssayAnswer=false;render()}

// ─── No Questions ───
function noQ(m){return `<div class="page"><div class="card" style="text-align:center;padding:40px"><div style="font-size:3rem;margin-bottom:12px"> 🔭</div><p style="color:var(--text2);font-size:1rem">${m}</p></div></div>`}

// ─── Progress ───
function rProg(){
  const mA=Object.keys(state.answeredMcq).length,tA=Object.keys(state.answeredTf).length;
  const tQ=APP_DATA.mcqs.length+APP_DATA.tf.length,aA=mA+tA;
  const pct=tQ>0?Math.round(aA/tQ*100):0;
  const chS=APP_DATA.chapters_meta.map(ch=>{
    const mT=APP_DATA.mcqs.filter(q=>q.ch===ch.key).length;
    const tT=APP_DATA.tf.filter(q=>q.ch===ch.key).length;
    const mD=APP_DATA.mcqs.filter((q,i)=>q.ch===ch.key&&state.answeredMcq[q.ch+'_'+i]!==undefined).length;
    const tD=APP_DATA.tf.filter((q,i)=>q.ch===ch.key&&state.answeredTf[q.ch+'_tf_'+i]!==undefined).length;
    const tot=mT+tT,don=mD+tD;
    return {...ch,total:tot,done:don,pct:tot>0?Math.round(don/tot*100):0}
  });
  return `<div class="page">
  <div class="stit"><span>📊</span> إحصائيات التقدم</div>
  <div class="sgrid">
    <div class="scard"><div class="sval">${state.level}</div><div class="slbl">المستوى</div></div>
    <div class="scard"><div class="sval">${(state.level-1)*100+state.xp}</div><div class="slbl">إجمالي النقاط</div></div>
    <div class="scard"><div class="sval">${state.totalCorrect}</div><div class="slbl">إجابة صحيحة</div></div>
    <div class="scard"><div class="sval">${aA}</div><div class="slbl">إجمالي الأسئلة</div></div>
    <div class="scard"><div class="sval">${pct}%</div><div class="slbl">نسبة الإنجاز</div></div>
    <div class="scard"><div class="sval">${state.correctStreak}</div><div class="slbl">سلسلة صحيحة</div></div>
  </div>
  <div class="stit"><span>📈</span> تقدم الفصول</div>
  ${chS.map(ch=>`<div class="card" style="border-right:4px solid ${ch.color}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-weight:700;font-size:.9rem">${ch.full_title}</span>
      <span style="font-weight:800;color:${ch.color}">${ch.pct}%</span>
    </div>
    <div class="xp-track"><div class="xp-fill" style="width:${ch.pct}%;background:${ch.color}"></div></div>
    <div style="font-size:.75rem;color:var(--text2);margin-top:4px">${ch.done} من ${ch.total} سؤال</div>
  </div>`).join('')}</div>`;
}

// ─── Achievements ───
function rAchs(){
  const u=ACHS.filter(a=>state.achievements[a.id]).length;
  return `<div class="page">
  <div class="stit"><span>🏆</span> الإنجازات (${u}/${ACHS.length})</div>
  ${ACHS.map(a=>`<div class="ach ${state.achievements[a.id]?'un':''}">
    <div class="ach-i">${a.icon}</div>
    <div><div style="font-weight:700;font-size:.9rem">${a.title}</div><div style="font-size:.78rem;color:var(--text2)">${a.desc}</div></div>
    ${state.achievements[a.id]?'<div style="margin-right:auto;color:var(--success);font-weight:700;font-size:.8rem">✓</div>':''}
  </div>`).join('')}</div>`;
}

// ─── Settings ───
function rSet(){
  return `<div class="page">
  <div class="stit"><span>⚙️</span> الإعدادات</div>
  <div class="card">
    <div class="srow"><div><div style="font-weight:700;font-size:.95rem">🌙 الوضع الداكن</div><div style="font-size:.78rem;color:var(--text2)">تغيير مظهر المنصة</div></div>
    <div class="tgl ${state.darkMode?'on':''}" onclick="tglDM()"></div></div>
    <div class="srow" style="border-bottom:none"><div><div style="font-weight:700;font-size:.95rem">🔄 إعادة تعيين التقدم</div><div style="font-size:.78rem;color:var(--text2)">حذف جميع البيانات المحفوظة</div></div>
    <button class="btn btno" style="color:var(--danger);border-color:var(--danger);font-size:.8rem" onclick="resetP()">إعادة تعيين</button></div>
  </div>
  <div class="card" style="margin-top:16px">
    <div style="font-weight:700;font-size:.95rem;margin-bottom:8px">📄 حول المنصة</div>
    <p style="font-size:.82rem;color:var(--text2);line-height:1.8">منصة تعليمية تفاعلية شاملة لمادة المكتبات والمعلومات. تشمل 6 فصول دراسية مع أسئلة متعددة، صح وخطأ، وأسئلة مقالية مع إجابات نموذجية. مع نظام نقاط خبرة وإنجازات للتحفيز.</p>
    <p style="font-size:.78rem;color:var(--text2);margin-top:8px">خط أميري للمحتوى العربي — خط القاهرة لواجهة المستخدم</p>
  </div></div>`;
}

function tglDM(){state.darkMode=!state.darkMode;document.documentElement.setAttribute('data-theme',state.darkMode?'dark':'');save();render()}

function resetP(){
  if(confirm('هل أنت متأكد من إعادة تعيين جميع التقدم؟ لا يمكن التراجع.')){
    localStorage.removeItem('eduPlat');
    state.xp=0;state.level=1;state.achievements={};state.answeredMcq={};state.answeredTf={};
    state.totalCorrect=0;state.totalAnswered=0;state.correctStreak=0;state.essayViewed=0;
    updXP();showToast('✅ تم إعادة التعيين','s');render()
  }
}

// ─── Init ───
load();
if(state.darkMode)document.documentElement.setAttribute('data-theme','dark');
updXP();renderNav();render();
</script>
