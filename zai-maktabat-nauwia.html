<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة التعليم المكتبات والمعلومات</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f9fc;--surface:#fff;--surface2:#f0f2f8;--text:#1a1a2e;--text2:#555;--primary:#6c5ce7;--primary2:#a29bfe;--accent:#fd79a8;--success:#00b894;--warning:#fdcb6e;--danger:#e17055;--border:#e0e0e0;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);--radius:16px;--radius-sm:10px;--font-ui:'Cairo',sans-serif;--font-content:'Amiri',serif;--amiri-lh:2.2}
[data-theme="dark"]{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#252542;--text:#e8e8f0;--text2:#a0a0b8;--primary:#a29bfe;--primary2:#6c5ce7;--border:#333355;--shadow:0 2px 12px rgba(0,0,0,.3);--shadow-lg:0 8px 32px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;line-height:1.7}
.app{max-width:900px;margin:0 auto;padding:12px 16px 100px}
@media(min-width:768px){.app{padding:24px 32px 100px}}
.header{text-align:center;padding:28px 0 20px}
.header h1{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.header p{color:var(--text2);font-size:.85rem}
.xp-bar{background:var(--surface);border-radius:20px;padding:10px 20px;margin:12px 0 8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.xp-lvl{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-weight:700;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.xp-info{flex:1}
.xp-lbl{font-size:.75rem;color:var(--text2)}
.xp-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:4px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width .5s}
.nav{display:flex;overflow-x:auto;gap:6px;padding:10px 0;scrollbar-width:none;-ms-overflow-style:none}
.nav::-webkit-scrollbar{display:none}
.nbtn{flex-shrink:0;padding:8px 16px;border:2px solid var(--border);border-radius:24px;background:var(--surface);color:var(--text2);font-family:var(--font-ui);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.nbtn:hover{border-color:var(--primary);color:var(--primary)}
.nbtn.act{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:transparent}
.page{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;border:1px solid var(--border)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.ch-card{cursor:pointer;border-right:5px solid var(--ch-color,var(--primary));position:relative;overflow:hidden}
.ch-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:var(--ch-color,var(--primary));opacity:.05;border-radius:0 0 0 80px}
.ch-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.7rem;font-weight:700;color:#fff;margin-bottom:8px}
.fchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.chip{padding:5px 14px;border-radius:16px;font-size:.75rem;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--text2);transition:all .2s;font-family:var(--font-ui)}
.chip.act{background:var(--primary);color:#fff;border-color:var(--primary)}
.qc{background:var(--surface);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:16px}
.qn{display:inline-block;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;padding:2px 12px;border-radius:12px;font-size:.75rem;font-weight:700;margin-bottom:12px}
.qt{font-family:var(--font-content);font-size:1.1rem;line-height:var(--amiri-lh);margin-bottom:18px;font-weight:700}
.qtag{display:inline-block;padding:2px 10px;border-radius:8px;font-size:.7rem;font-weight:600;color:#fff;margin-bottom:14px}
.opt{display:block;width:100%;text-align:right;padding:12px 16px;margin-bottom:8px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-family:var(--font-content);font-size:1rem;line-height:1.9;cursor:pointer;transition:all .2s;color:var(--text)}
.opt:hover:not(.dis){border-color:var(--primary);background:rgba(108,92,231,.05)}
.opt.ok{border-color:var(--success)!important;background:rgba(0,184,148,.1)!important;color:#00b894!important}
.opt.no{border-color:var(--danger)!important;background:rgba(225,112,85,.1)!important;color:#e17055!important}
.opt.dis{cursor:default;opacity:.7}
.tfrow{display:flex;gap:12px;margin-bottom:12px}
.tfbtn{flex:1;padding:14px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-family:var(--font-ui);font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text)}
.tfbtn:hover:not(.dis){border-color:var(--primary)}
.tfbtn.ok{border-color:var(--success)!important;background:rgba(0,184,148,.1)!important;color:var(--success)!important}
.tfbtn.dis{cursor:default}
.exp{margin-top:14px;padding:14px 18px;border-radius:var(--radius-sm);background:rgba(108,92,231,.06);border-right:4px solid var(--primary);font-family:var(--font-content);font-size:1rem;line-height:var(--amiri-lh);animation:fadeIn .3s}
.nrow{display:flex;gap:10px;justify-content:space-between;margin-top:16px;align-items:center}
.btn{padding:10px 24px;border-radius:24px;font-family:var(--font-ui);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;border:none}
.btnp{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}
.btnp:hover{transform:scale(1.03)}
.btno{background:var(--surface);color:var(--primary);border:2px solid var(--primary)}
.btno:hover{background:var(--primary);color:#fff}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.eq{font-family:var(--font-content);font-size:1.1rem;line-height:var(--amiri-lh);font-weight:700;margin-bottom:16px}
.sa-btn{padding:10px 24px;border-radius:24px;background:linear-gradient(135deg,var(--accent),#e84393);color:#fff;font-family:var(--font-ui);font-size:.85rem;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.sa-btn:hover{transform:scale(1.03)}
.sa-ans{margin-top:16px;padding:20px;background:rgba(253,121,168,.06);border-radius:var(--radius-sm);border-right:4px solid var(--accent);font-family:var(--font-content);font-size:1.05rem;line-height:var(--amiri-lh);animation:fadeIn .4s}
.scontent{font-family:var(--font-content);font-size:1.15rem;line-height:var(--amiri-lh);white-space:pre-wrap;word-wrap:break-word}
.scontent h2,.scontent h3{font-family:var(--font-content);color:var(--primary);margin:24px 0 12px;font-weight:700}
.scontent p{margin-bottom:16px}
.ctcontent{font-family:var(--font-content);font-size:1.15rem;line-height:var(--amiri-lh);white-space:pre-wrap;word-wrap:break-word}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.scard{background:var(--surface);border-radius:var(--radius-sm);padding:16px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.sval{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.slbl{font-size:.75rem;color:var(--text2);margin-top:4px}
.ach{display:flex;align-items:center;gap:14px;background:var(--surface);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border);opacity:.5;transition:all .3s}
.ach.un{opacity:1;border-color:var(--success)}
.ach-i{font-size:2rem;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:var(--surface2);flex-shrink:0}
.ach.un .ach-i{background:linear-gradient(135deg,var(--success),#55efc4)}
.srow{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)}
.tgl{position:relative;width:50px;height:28px;background:var(--border);border-radius:14px;cursor:pointer;transition:background .3s}
.tgl.on{background:var(--primary)}
.tgl::after{content:'';position:absolute;top:3px;right:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:transform .3s}
.tgl.on::after{transform:translateX(-22px)}
.bbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:var(--surface2);color:var(--text2);font-family:var(--font-ui);font-size:.8rem;font-weight:600;cursor:pointer;border:none;margin-bottom:16px;transition:all .2s}
.bbtn:hover{background:var(--primary);color:#fff}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;border-radius:24px;font-family:var(--font-ui);font-size:.85rem;font-weight:700;color:#fff;z-index:9999;transition:transform .4s;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-s{background:var(--success)}
.toast-e{background:var(--danger)}
.toast-x{background:linear-gradient(135deg,var(--primary),var(--accent))}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998}
.stit{font-size:1.2rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stit span{font-size:1.4rem}
.qa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.qa{background:var(--surface);border-radius:var(--radius-sm);padding:18px 12px;text-align:center;cursor:pointer;box-shadow:var(--shadow);border:1px solid var(--border);transition:all .2s;font-family:var(--font-ui);color:var(--text)}
.qa:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.qa-i{font-size:1.8rem;margin-bottom:6px}
.qa-l{font-size:.75rem;font-weight:600;color:var(--text2)}
@media(max-width:480px){.header h1{font-size:1.3rem}.qc{padding:16px}.qt{font-size:1rem}.sgrid{grid-template-columns:repeat(2,1fr)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--primary2);border-radius:3px}
/* ─── Chapter Content Professional Design ─── */
.ch-toc{background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(162,155,254,.08));border-radius:var(--radius-sm);padding:16px 20px;margin-bottom:20px;border:1px solid rgba(108,92,231,.15)}
.ch-toc h4{font-family:var(--font-ui);font-size:.85rem;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ch-toc ul{list-style:none;padding:0}
.ch-toc li{padding:4px 0;font-size:.8rem;color:var(--text2);cursor:pointer;transition:color .2s}
.ch-toc li:hover{color:var(--primary)}
.ch-toc li::before{content:'•';color:var(--primary);font-weight:700;margin-left:8px}
.ch-section{margin-bottom:24px;animation:fadeIn .4s ease}
.ch-section-head{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;padding:10px 18px;border-radius:var(--radius-sm);font-family:var(--font-content);font-size:1.05rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ch-subsection-head{background:linear-gradient(135deg,rgba(253,121,168,.1),rgba(232,67,147,.1));color:var(--accent);padding:8px 16px;border-radius:var(--radius-sm);font-family:var(--font-content);font-size:.95rem;font-weight:700;margin:16px 0 10px;border-right:3px solid var(--accent)}
.ch-info-box{background:linear-gradient(135deg,rgba(0,184,148,.06),rgba(85,239,196,.06));border:1px solid rgba(0,184,148,.2);border-right:4px solid var(--success);border-radius:var(--radius-sm);padding:16px 20px;margin:16px 0;font-family:var(--font-content);font-size:1.05rem;line-height:var(--amiri-lh)}
.ch-def-box{background:linear-gradient(135deg,rgba(108,92,231,.06),rgba(162,155,254,.06));border:1px solid rgba(108,92,231,.2);border-right:4px solid var(--primary);border-radius:var(--radius-sm);padding:16px 20px;margin:16px 0;font-family:var(--font-content);font-size:1.05rem;line-height:var(--amiri-lh)}
.ch-list-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;font-family:var(--font-content);font-size:1.05rem;line-height:var(--amiri-lh)}
.ch-list-num{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;min-width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:2px}
.ch-list-dot{color:var(--accent);font-size:1.2rem;line-height:1.6;flex-shrink:0}
.ch-text{font-family:var(--font-content);font-size:1.1rem;line-height:var(--amiri-lh);margin-bottom:12px;color:var(--text)}
.ch-page-num{display:inline-block;background:var(--surface2);color:var(--text2);font-size:.7rem;padding:2px 8px;border-radius:10px;margin:4px 0;font-family:var(--font-ui)}
</style>
</head>

  "ch1": "### مقدمة الفصل الأول: الأنشطة العامة التي تقوم بها مختلف أنواع المكتبات ومراكز المعلومات\n\n### تعريف المكتبات ومراكز المعلومات وأهميتها\nتُعرّف المؤسسات المعلوماتية بأنها مؤسسات علمية وثقافية تهدف إلى جمع وتنظيم واسترجاع وبث مصادر المعلومات بكافة أشكالها، ثم تسهيل أو تيسير وصول الباحثين والمستفيدين إلى هذه المصادر بأسرع وقت وأقل جهد وأقصى دعة ممكنة. وتتعدد أنواع المكتبات فمنها المكتبات الوطنية والجامعية ومكتبات الكليات والأقسام العلمية، والمكتبات العامة والمدرسية، والمكتبات المتخصصة في دور الصحف أو الوزارات أو الجمعيات العلمية أو مكتبات المستشفيات والمكتبات الطبية والزراعية، بالإضافة إلى مراكز المعلومات بأنواعها المختلفة والتي يتزايد إنشاؤها مع التطور الصناعي والإداري والزراعي والاجتماعي للدولة. وقد صار من الضروري فهم أنواع هذه المؤسسات وخصائص كل منها حتى يمكن التعامل معها بكفاءة وفعالية.\n\n### مفهوم الاختلاف بين أنواع المكتبات\nيرى المبتدئون في أعمال وأنشطة المكتبات ومراكز المعلومات أنها متماثلة في مجموعاتها وتنظيمها وخدماتها وإدارتها، ولكن المتمرسين والدارسين لمختلف هذه المؤسسات يدركون المدى الواسع والاختلاف الواضح بينها بالنسبة لأهدافها وتنظيمها ومجموعاتها والخدمات التي تؤديها. ويعبر عن هذا الاختلاف عادة بالاختلاف في الدرجة لا في النوع، بمعنى أن جميع هذه المؤسسات تقوم بوظائف متشابهة لكن بدرجات متفاوتة من العمق والتخصص. وهذا الاختلاف في الدرجة واضح بين أنواع المكتبات المختلفة في الإمكانيات البشرية والمادية وفي مقدرتها على استخدام تكنولوجيا الاتصال والمعلومات ومعالجة الموضوعات المختلفة. فالمكتبة الجامعية تقدم خدمات مرجعية وبحثية أعمق من المكتبة العامة، ومراكز المعلومات المتقدمة تستخدم تكنولوجيا أكثر تطوراً من المكتبات التقليدية.\n\n### الأنشطة العامة للمكتبات ومراكز المعلومات\nوعلى الرغم من الاختلاف الواضح بين المكتبات ومراكز المعلومات بأشكالها المتعددة، إلا أن هناك بعض الأنشطة العامة التي تنسحب عليها جميعها وإن اختلفت في الدرجة لا في النوع. وتتمحور هذه الأنشطة حول ثلاثة محاور أساسية: أولاً الإدارة والتمويل واختيار الموظفين، وثانياً بناء المجموعات ومصادر المعلومات، وثالثاً خدمات المعلومات والمستفيدين.\n\n### أولاً: الإدارة والتمويل واختيار الموظفين\n#### مفهوم الإدارة في المكتبات ومراكز المعلومات\nيرى البعض أن معظم أنشطة المكتبات والمعلومات يقع في مجال الإدارة بمعناها العام وهم يقصدون بذلك أن هناك مؤسسات تنتج الكتب والدوريات والتقارير وغيرها من مصادر المعلومات كالجامعات والناشرين، كما أن هناك المستفيدين من هذه المصادر، ودور المكتبات وأجهزة المعلومات على ضخامة هذا الدور هو إتاحة هذه المصادر للمستفيدين بأيسر السبل وأقل التكاليف وهذه إدارة. كما يرى البعض في الإدارة منهج بحث يتضمن تحليل النظم ونظم المحاكاة والمباريات واتخاذ القرار وبحوث العمليات والجوانب السلوكية ثم تطبيق هذا كله على مشكلات المكتبات والمعلومات. وتكمن فلسفة العمل المكتبي والمعلوماتي في كونها وسيطاً بين الأوعية بمختلف أشكالها والمستفيدين منها.\n\n#### دور مدير المكتبة أو مركز المعلومات ومسؤولياته\nيقوم مدير مركز المعلومات أو المكتبة بمسؤولية تحديد الأهداف ووضع السياسات والبرامج التي تحقق هذه الأهداف، كما أنه مسؤول عن وضع تنظيمات الخدمات والموظفين، فضلاً عن التوجيه والرقابة لضمان حسن أداء الخدمات المختلفة. ويتضمن عمله صياغة القواعد اللازمة لعمليات الإعارة والتسجيل والمراجع والتصوير، وإعداد الميزانية وتخطيط المبنى والتجهيزات والآلات اللازمة، وإعداد جداول المرتبات لأمناء واختصاصي المعلومات ومساعديهم تبعاً لمؤهلاتهم وخبراتهم. كما يختص بالتوصية بتعيين الموظفين واختيارهم وترقياتهم ونقلهم وتحديد الواجبات وتفويض سلطاته لرؤساء الأقسام. وعلى الرغم من الدور الأساسي للمدير إلا أن هناك عناصر أخرى تدخل في وضع السياسة العامة كالجان المكتبات ومجالس الجامعات واللجان الحكومية المحلية.\n\n#### الميزانية والتمويل في المكتبات\nتتنوع الميزانيات في المكتبات إلى نوعين أساسيين: ميزانية رأسمالية تتصل بالإنشاءات على المدى البعيد والقريب وتتعلق بالمباني والمنشآت الجديدة والتجهيزات والأدوات الثابتة وبرامج التطوير الجذري، وميزانية جارية يتم إعدادها سنوياً بالتشاور مع كبار المعاونين وتتضمن احتياجات الموظفين والأجهزة والمطبوعات وعمليات الصيانة والتجليد. وتشمل بنود المصروفات الرئيسية: الرواتب والأجور والمكتب والمطبوعات واشتراكات الدوريات وأدوات قرطاسية وإيجارات ونفقات خدمات. أما مصادر الإيرادات فتشمل: غرامات الكتب المتأخرة ورسوم الكتب المحجوزة وخدمات التصوير والمعلومات وبيع بطاقات الفهارس وإيجار قاعة المحاضرات. وفي مراكز المعلومات تُضاف نفقات الاشتراك في مراصد المعلومات وتشغيل الحاسب الإلكتروني وتكنولوجيا الاتصال. ويتم مناقشة الميزانية في اللجان المختصة ويقوم المدير بتبرير النفقات مع إمكانية توفير ميزانية إضافية في الحالات الضرورية. كما أن الميزانية العامة تكون مرنة بحيث يمكن النقل من بند إلى آخر.\n\n#### اختيار الموظفين وتحديد الواجبات\nتتطلب المكتبات ومراكز المعلومات توظيف مهنيين وتخصصيين في المكتبات والمعلومات بالإضافة إلى الوظائف الإدارية والكتابية الأخرى والوظائف غير المهنية. كما تحتاج المكتبات المتخصصة والجامعية إلى اختصاصيين في الموضوعات من البكالوريوس إلى الدكتوراة. وتتنوع الواجبات المهنية بين الأهداف ووضع السياسات وإعداد الميزانية والإشراف على الموظفين وتقييم العمل وتعيين الموظفين وتنمية قدراتهم والتدريب أثناء العمل والعلاقات العامة واختيار مواد المكتبة والفهرسة والتصنيف وخدمات الإعارة والخدمات المرجعية. أما الواجبات غير المتخصصة فتشمل الأعمال الكتابية كإعداد الطلبات الروتينية وحفظ السجلات وأعمال التصوير والرد على الهاتف واستلام المواد المكتبية وترتيب الرفوف والتسجيل وإحصاءات الإعارة وإحصاءات العضوية.\n\n### ثانياً: بناء المجموعات ومصادر المعلومات\n#### مفهوم بناء المجموعات وأهميته\nيعتمد حجم وطبيعة ومحتوى مجموعات مركز المعلومات أو المكتبة على الأهداف الخاصة بالمؤسسة واحتياجات المستفيدين والرواد ويقوم اختصاصيو المعلومات باختيار مصادر المعلومات اللازمة لتحقيق البرنامج الناجح للمؤسسة. وهناك فيض هائل من المطبوعات المنشورة وغير المنشورة وأهم وظيفة نقوم بها هي الاختيار السليم من بين هذا الفيض الهائل.\n\n#### التوازن في المجموعات المكتبية\nيُقصد بعملية الاختيار حصول المكتبة أو المركز على مجموعات متوازنة تغطي المعرفة بصفة عامة واحتياجات المستفيدين. ويشمل التوازن عدة جوانب: التوازن من ناحية الموضوعات العلمية للمجموعات المقتناة، والتوازن من ناحية أشكال المقتنيات كالكتب والدوريات والرسائل والتقارير والصحف والمخطوطات والوسائل السمعية والبصرية، والتوازن بين المواد المرجعية التي يُرجع إليها للحصول على معلومة محددة والكتب العادية التي تُقرأ من أولها لآخرها.\n\n#### أدوات اختيار مصادر المعلومات ووسائل الحصول عليها\nتتعدد الأدوات الببليوجرافية وقوائم الكتب الصالحة لكل نوع من أنواع المكتبات ومن أمثلتها: الببليوجرافيات القومية كنشرة الإيداع الشهرية التي تصدرها دار الكتب والوثائق القومية في مصر والنشرة العراقية للمطبوعات ودليل الكتاب المصري والدليل الببليوجرافي للمراجع العربية، وفهارس الناشرين العرب والأجانب. ويمكن الحصول على المصادر عن طريق الشراء أو التبادل أو الإهداء. وتتم عملية الاختيار عادة عن طريق ملاحظة القراء والمستفيدين أو تلقي مقترحاتهم أو التغذية المرتدة أو تحليل سجلات المعلومات كإحصاءات الإعارة والأسئلة المرجعية وإجابتها.\n\n#### تصنيفات مصادر المعلومات المتعددة\nتوجد تصنيفات عديدة لمصادر المعلومات. حسب طبيعة الورود إلى: مصادر أولية كالكتب والدوريات والتقارير وبراءات الاختراع والرسائل الجامعية، ومصادر ثانوية كالدوريات الكشفية ودوريات المستخلصات والببليوجرافيات، ومصادر من الدرجة الثالثة كببليوجرافيا الببليوجرافيات وأدلة الإنتاج الفكري. وحسب الشكل إلى: مصادر مطبوعة ومصادر سمعية بصرية ومصغرات كالتسجيلات والأقراص البصرية والميكروفيلم، ومصادر مقروءة آلياً كالأشرطة الممغنطة والأقراص البصرية. وحسب الرقمية إلى: مصادر رقمية وغير رقمية وإشارات ببليوجرافية. وحسب الرسمية إلى: مصادر رسمية عبر الوثائق المطبوعة ومصادر غير رسمية عبر المناقشات وجهاً لوجه. ومن الملاحظات الهامة أن الإنتاج الفكري الأولي مشتت بدرجة كبيرة وغير منتظم على عكس الصادر من الدرجة الثالثة المتميز بالتنظيم والترتيب، وأن المصادر الأولية أدق من الثانوية لأنها تضم الوقائع التي كتبها المؤلف بنفسه.\n\n### ثالثاً: تنظيم وتحليل المجموعات\n#### نظم التصنيف الرئيسية\nتعتبر المكتبات أفضل مكان يمكن أن يحصل فيه الباحث على المعلومات بطريقة سهلة وسريعة نظراً لأنها تنظم الكتب والمجموعات حسب نظم التصنيف التي تعني وضع الكتب ذات الموضوع الواحد في مكان واحد لتيسير الوصول إليها. ومن أهم نظم التصنيف: تصنيف ديوي العشري الذي يعتمد على تقسيم المعرفة إلى عشرة مجالات رئيسية وكل مجال ينقسم إلى عشرة أقسام وكل قسم إلى عشرة فروع ويُعبر عن الموضوعات بالأرقام، وتصنيف مكتبة الكونجرس الذي يستخدم الحروف والأرقام حيث توضح المجالات الرئيسية بالأحرف الإنجليزية والأقسام الفرعية بالأرقام ويضم واحد وعشرون مالاً رئيسياً للمعرفة، والتصنيف الببليوجرافي لبليس وتصنيف الكولون لرانجاناتان والتصنيف العشري العالمي.\n\n#### الفهرسة الوصفية والموضوعية\nيتضمن تنظيم المكتبات فهرسة المواد المكتبية. ويتضمن فهرس المكتبة: فهرس المؤلفين حيث تُرتب البطاقات ترتيباً هجائياً، وفهرس العناوين، وفهرس الموضوعات. والفهرس القاموسي يضم جميعها في ترتيب هجائي واحد. وتتضمن الفهرسة الوصفية وصف الكتاب من مؤلف وعنوان وبلد النشر والناشر وسنة النشر، أما الفهرسة الموضوعية فتتعلق بوضع رؤوس موضوعات لوصف المحتوى الموضوعي.\n\n#### التكشيف والاستخلاص وأنواع الكشافات\nيتم تنظيم المواد كذلك عن طريق التكشيف والاستخلاص. والكشاف دليل منهجي لموضع أو مكان الكلمات أو المفاهيم عن المطبوعات ويتكون من سلسلة مداخل تُرتب وفق الترتيب الهجائي. ومن أنواعه: الكشاف الموضوعي الهجائي والكشاف المصنف وكشاف المؤلف والكشاف المترابط وكشاف كلمات النص وكشاف الكلمات الدالة في السياق وكشاف الاستشهادات المرجعية. ومن أهم أدلة الكشافات كشافات مقالات الدوريات.\n\n### رابعاً: خدمات المعلومات والمستفيدين\n#### مفهوم خدمات المعلومات وأهميتها\nتعتبر خدمات المعلومات مرآة مراكز المعلومات وهي التي تعكس قدرتها على إفادة المستفيدين وتُعد المحك الرئيسي لنجاح أي مكتبة. لم يعد تقييم فاعلية المكتبة يعتمد فقط على بنائها وتنظيمها ومقتنياتها وموظفيها بل أصبحت تُقيم بمدى استخداماتها ومدى ما تقدمه من خدمات لمرتاديها. وحتى تتمكن أي مكتبة من تحقيق أهدافها عليها ثلاثة أعمال أساسية: توفير ما يحتاجه الرواد من مواد مكتبية، وتنظيم هذه المواد بشكل يساعد على استخدامها أفضل استخدام، وتقديم كل ما يلائمهم من خدمات معلوماتية.\n\n#### أنواع ومستويات خدمات المعلومات\nتشمل خدمات المعلومات: الخدمات المرجعية والرد على الاستفسارات والأسئلة وهي قمة العمل المكتبي حيث يقدم أمين المراجع المعلومات لا الكتب ويجيب على الأسئلة المتعلقة بالحقائق والموضوعات، وخدمات تداول أوعية المعلومات كالإعارة وتبادل المصادر بين المراكز، وإعداد القوائم الببليوجرافية والكشافات والمستخلصات التي تشمل حصراً خارجياً وداخلياً، والترجمة لضرورة التعامل مع النشر العلمي بلغات عديدة، وخدمات الإحاطة الجارية بالمعلومات المنشورة حديثاً، والبث الانتقائي للمعلومات الموجه لفرد معين حسب سماته واهتماماته على عكس الإحاطة الجارية الموجهة للباحثين في تخصص معين، وخدمة التصوير والاستنساخ، والنشر وإصدار المطبوعات الأولية والثانوية، وتدريب المستفيدين وتوعيتهم، وخدمات العلاقات العامة والعلاج بالقراءة وتشجيع القراءة. وهناك ثلاثة مستويات للخدمة: أدناها بث المعلومات والإجابة على الأسئلة المرجعية وتوجيه المستفيدين، والمتوسط بإحاطة الإنتاج الفكري وإعداد الببليوجرافيات، وأعلاها خدمات مراكز تحليل المعلومات التي تعد المراجعات وتقييم المعلومات وقد تقوم بتخليق معلومات جديدة لحل مشكلات محددة. وشبكات المعلومات والتنظيمات التعاونية من شأنها أن تضع مقتنيات المركز وخدماته في متناول الآخرين مما يزيد من قدرته على توفير المصادر. ويسرت المستحدثات التكنولوجية إمكانية الخدمة الإلكترونية على الخط المباشر وبواسطة الأقراص المكنزة.",
  "ch3": "### مقدمة الفصل الثالث: الخدمة المرجعية الإلكترونية\n\n### أولاً: خدمة الرد على الاستفسارات\n#### مفهوم الخدمة المرجعية والهدف منها وأهميتها\nإن الهدف الرئيسي من تقديم خدمة الرد على الاستفسارات هو الإجابة على استفسارات المستفيدين بأقصى سرعة ممكنة وبدقة متناهية بحيث يشعر المستفيد بأنه قد تم إشباع حاجته إلى المعلومات. وتعتمد تلك الخدمة على مجموعة من المقومات الأساسية التي تساعد على تقديم الخدمة بكفاءة وفعالية. وتشمل هذه المقومات ثلاثة عناصر جوهرية: أولاً مجموعة متميزة من مصادر المعلومات المرجعية يتم اختيارها بعناية شديدة ووفقاً لاحتياجات المستفيدين من المكتبة أو مركز المعلومات. ثانياً مجموعة متميزة من العاملين المؤهلين والمدربين على تقديم خدمات المعلومات بحيث يكون لديهم القدرة على تحقيق الإفادة القصوى مما يتوافر لديهم من مصادر المعلومات لتبلية احتياجات المستفيدين مما يحقق مستوى عالياً من فعالية وعائد التكلفة من تقديم الخدمة. ثالثاً التجهيزات اللازمة لتقديم الخدمة من أجهزة وأثاث وما يتبع ذلك من صيانة تلك التجهيزات. وتُعد هذه المقومات الأساسية ضرورية لضمان جودة الخدمة المرجعية وتلبية احتياجات المستفيدين بكفاءة عالية.\n\n#### مفهوم كلمة مرجع واشتقاقها\nكلمة مرجع مشتقة من الأصل رجع والذي يعني استشارة أو الرجوع إلى شيء آخر مما يعني وجود علاقة أو رابطة بين شيئين. وهذين الشيئين هما الاستفسار والمصدر المستخدم في الإجابة عليه. وبالطبع توجد العديد من العلاقات تسبق صياغة الاستفسار وتؤثر فيه وأهمها الحالة المعرفية للمستفيد والتي تؤثر بالطبع في مدى عمق الإجابة التي يحتاج إليها. كما توجد العديد من العلاقات توسط بين الاستفسار والمصدر تتمثل في اللقاء الذي يتم بين المستفيد وأخصائي المعلومات الذي يتولى تحديد المصدر المناسب للإجابة على الاستفسار وهذا اللقاء غالباً ما يُعرف في الإنتاج الفكري المتخصص في مجال المكتبات والمعلومات بالمقابلة المرجعية. كما أن هناك علاقة تلي عملية الرد على الاستفسار تتمثل في متابعة مدى رضاء المستفيد عن الإجابة المقدمة. وهكذا يشكل مفهوم المرجعية شبكة من العلاقات المتكاملة التي تضمن فعالية الخدمة وكفاءتها.\n\n#### تعريف المصدر المرجعي وخصائصه\nيشير محمد فتحي عبد الهادي إلى تعريف معجم جمعية المكتبات الأمريكية إلى أن المصدر المرجعي هو أي مصدر يُستخدم في الحصول على معلومات موثوق بها في تعامل أو إجراء مرجعي. وتشمل المصادر المرجعية: المواد المطبوعة والمواد السمعية والبصرية وقواعد البيانات المقروءة آلياً والتسجيلات الببليوجرافية. ويمكن إضافة المواد المتاحة من خلال شبكات المعلومات وخاصة شبكة الإنترنت مثل القواميس الإلكترونية والموسوعات الإلكترونية وأدلة البحث ومحركات البحث وما وراء المحركات. كما عُرّف الكتاب المرجعي على أنه كتاب تم تصميمه من حيث الترتيب والمعالجة الموضوعية لكي يُستشار عند الحاجة إلى وحدات معلومات محددة أي أنه يُستشار عند الحاجة فقط ولا يُقرأ من أوله لآخره. ومن المفاهيم المتعارف عليها أن الكتاب المرجعي مثله مثل الدوريات العلمية يقتصر استعماله على الاستخدام داخل المكتبة ولا يسمح باستعارته خارج جدرانها إلا أن الشكل الإلكتروني من المصادر المرجعية أتاح للمستفيد إمكانية استخدامها خارج المكتبة.\n\n#### المصادر المرجعية والمصادر الأخرى للمعلومات: أوجه الاختلاف\nتتميز المصادر المرجعية عن غيرها من مصادر المعلومات في عدة جوانب أساسية. أولاً من حيث الاستخدام فهي يُرجع إليها للرد على استفسار معين بالتالي لا تُقرأ من أولها لآخرها كغيرها من مصادر المعلومات بل يُرجع إليها عند الحاجة للحصول على معلومة محددة كدليل التليفون الذي يُستخدم فقط عند الحاجة لمعرفة رقم شخص أو مؤسسة. ثانياً من حيث التنظيم تُنظم المصادر المرجعية وفقاً لأساليب التنظيم المعروفة كالترتيب الزمني والهجائي والمصنف والقاموسي بينما تُنظم المعلومات في المصادر الأخرى منهجياً لخدمة الاحتياجات القرائية للمستفيدين والتي تختلف من مصدر إلى آخر. ثالثاً من حيث الحجم فإن حجم المصادر المرجعية عادة ما يكون كبيراً جداً قد يصل إلى آلاف الصفحات بينما حجم المصادر الأخرى يكون صغيراً مقارنة بها. رابعاً من حيث طريقة العرض فإن معظم المصادر المرجعية تقدم معلومات في صورة وحدات بيانات مركزة ومتناسقة من حيث طبيعة البيانات وحجمها ونوعها كالببليوجرافيات التي تقدم تسجيلات تشتمل على المؤلف والعنوان وبيانات النشر. خامساً تؤثر طبيعة شبكة المعلومات الداخلية للمكتبة على فرص الاستخدام حيث تتيح بعض الشبكات الدخول من أي مكان في العالم بينما البعض الآخر يتطلب الدخول على الشبكة المحلية وهذا النوع يتمتع بقدر أكبر من الحماية.\n\n#### الهدف من الخدمة المرجعية والالتزام الأخلاقي\nإذا كان الهدف الرئيسي من تقديم خدمة الرد على الاستفسارات هو تلبية احتياجات المستفيدين من المعلومات فإن إرشادات جمعية المكتبات الأمريكية تشير إلى أن المكتبة لديها التزام أخلاقي تجاه المجتمع الذي تخدمه يتمثل في توفير المصادر المرجعية التي تساعد هذا المجتمع على القيام بوظائفه المنوطة به. وعلى ذلك فإن المكتبات المتخصصة مسئولة عن توفير المصادر المرجعية التي تخدم الاحتياجات البحثية للمستفيدين، والمكتبة الأكاديمية عليها أن تقتني المصادر المرجعية التي تخدم الاحتياجات الدراسية والبحثية، والمكتبة العامة عليها توفير المصادر التي تخدم الاحتياجات العامة للمجتمع. وتتنوع الاحتياجات المرجعية للمستفيدين وبالتالي يكون على المؤسسات توفير المصادر المرجعية التي تمكن أخصائي المراجع من الرد على جميع الاستفسارات.\n\n### ثانياً: احتياجات المستفيدين من المعلومات ومراحل تطورها\nيمر الفرد بثلاث مراحل أساسية حتى يستطيع التعبير عن احتياجه للمعلومات بصورة صحيحة ودقيقة والتي تتمثل في الاستفسارات حيث تمثل استفسارات المستفيدين المادة الخام التي يتعامل معها أخصائي المراجع. المرحلة الأولى هي الرغبة وتظهر مع شعور الفرد بنقص ما أو فجوة في بنيته المعرفية في جانب معين. وعادة ما تنتج الرغبة نتيجة لباعث خارجي مثل استفسار موجه من فرد آخر إليه أو الرغبة في معرفة شيء سمعه من خلال وسائل الإعلام. وتتشكل الرغبة نتيجة لطبيعة الفرد وحبه للمعرفة. المرحلة الثانية هي الحاجة إلى المعلومات وتتحول الرغبة إليها عند تحديد طبيعة وحجم المعلومات المطلوبة. فالمعلومات التي يحتاجها طالب تختلف من حيث الكم والعمق عن المعلومات التي يحتاجها الباحث المتخصص. المرحلة الثالثة هي الطلب ويتحول عند التعبير عن الحاجة في شكل استفسار يوجه إلى أخصائي المعلومات ويمثل التعبير الرسمي عن الحاجة. ثم يتولى أخصائي المعلومات مناقشة الطلب من خلال المقابلة المرجعية التي تنتج صياغة الاستفسار في صورة إستراتيجية بحث تُستخدم في عملية البحث واسترجاع المعلومات.\n\n### ثالثاً: خطوات تقديم الخدمة المرجعية\nتمر عملية تقديم الخدمة المرجعية بأربع خطوات أساسية. الخطوة الأولى هي تقديم السؤال إلى أخصائي المراجع ويمكن أن يتم بصورة شفوية عبر التليفون أو الحضور الشخصي للمكتبة أو بصورة رسمية من خلال استمارة أو من خلال البريد الإلكتروني أو حجرات الدردشة التي توفرها خدمات المراجع الإلكترونية في المكتبات العالمية الكبرى. وفي حالة تلقي الاستفسار بشكل غير رسمي يجب تحويله إلى الشكل الرسمي كملف استفسارات أو قاعدة بيانات إلكترونية. الخطوة الثانية هي التعرف على الحدود المختلطة للاستفسار حيث يتولى أخصائي المراجع تحديد الجوانب الموضوعية والجغرافية والشكلية والزمنية للاستفسار. الخطوة الثالثة هي المقابلة المرجعية وتتضمن مهارات أساسية متعددة: الإنصات للمستفيد، ومحاولة شرح وتفسير تعبيراته بإعادة صياغتها مما يؤكد الاهتمام ويتأكد من الفهم الصحيح، واستخدام الأسئلة المفتوحة والمغلقة، والتوضيح لتضييق أو توسيع نطاق الاستفسار، والمراجعة والفحص لمصطلحات الاستفسار والهجاء السليم، والحصول على العناصر الأساسية كالغرض والوقت المناسب واللغة والكمية ومدى العمق وكيف ومتى وأين سيحصل المستفيد على الإجابة. الخطوة الرابعة هي تحديد المرجع المناسب وبناء إستراتيجية البحث وإجراء البحث وتقديم المعلومات والمتابعة. حيث تحتاج الأسئلة الببليوجرافية إلى أدلة الإنتاج الفكري والأسئلة المفاهيمية إلى الموسوعات. ويتم تحديد المصطلحات بالاستعانة بالمعاجم والمكائز للحصول على المصطلحات الأعرض والأضيق ثم الربط بينها باستخدام قواعد الربط البوليني. ويختلف بحث المصادر المطبوعة عن الإلكترونية في الأساليب المستعملة. ثم تُقدم المعلومات بالطريقة المناسبة وتتم المتابعة للتأكد من رضاء المستفيد.\n\n### رابعاً: الخدمة المرجعية الإلكترونية\n#### خلفية عامة وأشكال التقديم\nتعد الخدمة المرجعية الرقمية واحدة من أسرع الخدمات نمواً وابتكاراً التي تم تطويرها من قبل المكتبات مؤخراً. وتشير إلى شبكة من الخبراء والوسطاء والمصادر التي تُقدم لسد حاجة المستفيد في البيئة التشابكية على الخط المباشر. وتقدم المكتبات الخدمة بأحد الأشكال التالية: جزء من الخدمة المرجعية التقليدية أو خدمة مستقلة أو جزء من اتحاد تعاوني. وقد ساعدت الخدمة المرجعية الإلكترونية على زيادة إتاحة خدمات المكتبة بشكل لا يعتمد على الزيارة المادية مما أتاح للمستفيدين تزايد استخدام واعتمادهم على الخدمات الرقمية كجزء من حياتهم اليومية. كما لاحظنا نمواً في عدد الخدمات المقامة تحت مسميات مختلفة تقدمها القطاعات التجارية والتعليمية والمؤسسات غير الهادفة للربح.\n\n#### ملاحظات حول التقييم وأهميته في الخدمة المرجعية الإلكترونية\nعلى الرغم من الاهتمام المتزايد بتطبيق الخدمة المرجعية الرقمية خلال الأعوام الماضية إلا أنه ما زال هناك اهتمام محدود بموضوع تقييم هذه الخدمة. ويُعد التقييم عملية ضرورية لقياس فاعلية الخدمة المقدمة وتحديد نقاط القوة والضعف فيها والعمل على تطويرها بشكل مستمر. ويتضمن التقييم عدة جوانب من بينها: سرعة الاستجابة للاستفسارات ودقة الإجابات المقدمة ومدى رضا المستفيدين عن الخدمة وكفاءة استخدام المصادر الإلكترونية المتاحة. ويرى المتخصصون أن تقييم الخدمة المرجعية الإلكترونية يختلف عن تقييم الخدمة التقليدية في عدة جوانب منها الطبيعة التفاعلية للخدمة الإلكترونية وإمكانية تتبع الاستفسارات إلكترونياً وتحليلها بشكل منهجي. كما أن الخدمة المرجعية الإلكترونية تتيح إمكانيات للتوثيق والتسجيل لم تكن متاحة في الخدمة التقليدية حيث يمكن حفظ جميع الاستفسارات والإجابات في قواعد بيانات إلكترونية مما يسهل عملية المراجعة والتقييم والتحسين المستمر للخدمة.\n\n#### التحديات والفرص في الخدمة المرجعية الإلكترونية\nتواجه الخدمة المرجعية الإلكترونية عدة تحديات من أبرزها: الحاجة إلى تأهيل وتدريب أخصائي المراجع على استخدام التقنيات الإلكترونية الحديثة والتواصل مع المستفيدين عبر الوسائل الرقمية، ومواكبة التطور السريع في تكنولوجيا المعلومات والمصادر الإلكترونية، وضمان أمن المعلومات وحماية خصوصية المستفيدين في البيئة الرقمية، وتوفير المصادر الإلكترونية الكافية التي تغطي احتياجات المستفيدين المتنوعة، والتغلب على الحواجز اللغوية والتقنية التي قد تحول دون الاستفادة الكاملة من الخدمة. وفي المقابل تتيح الخدمة المرجعية الإلكترونية فرصاً واسعة من أهمها: توسيع نطاق الخدمة ليشمل مستفيدين خارج نطاق المكتبة الجغرافي، وإمكانية تقديم الخدمة على مدار الساعة تقريباً، وتوفير الوقت والجهد على المستفيدين والمكتبة معاً، وتحسين جودة الخدمة من خلال استخدام أدوات البحث الإلكترونية المتقدمة، وإمكانية توجيه المستفيدين إلى مصادر مرجعية إلكترونية متعددة ومتنوعة لم تكن متاحة في شكلها التقليدي، وبناء قواعد معرفية من الاستفسارات المتكررة يمكن الاستفادة منها في تحسين الخدمة مستقبلاً.\n\n#### ملخص الفصل وأهم المفاهيم الأساسية\nيتناول الفصل الثالث الخدمة المرجعية الإلكترونية كأحد أهم الخدمات المعاصرة في مجال المكتبات والمعلومات. ويركز على عدة مفاهيم أساسية: خدمة الرد على الاستفسارات باعتبارها المحور الرئيسي للخدمة المرجعية، والمقومات الأساسية المتمثلة في المصادر المرجعية المتميزة والعاملين المؤهلين والتجهيزات اللازمة، والمقابلة المرجعية كأداة جوهرية للتعرف على احتياجات المستفيد الحقيقية وصياغة الاستفسار بشكل دقيق، وإستراتيجية البحث باعتبارها الآلية المنهجية للوصول إلى المعلومات المطلوبة باستخدام قواعد الربط البوليني وغيرها من المبادئ العلمية. كما يتناول الفصل التحول من الخدمة المرجعية التقليدية إلى الخدمة المرجعية الإلكترونية وأثر ذلك على إتاحة الخدمة للمستفيدين وزيادة اعتمادهم على المصادر الرقمية. ويؤكد على أن الهدف النهائي لكل هذه العمليات هو إشباع حاجة المستفيد إلى المعلومات والتأكد من رضاه عن الخدمة المقدمة.",
  "ch4": "المكتبة المدرسية كمركز لمصادر التعلم\n\n### المقدمة: المكتبة المدرسية والنظام التعليمي\n\nتعتبر المكتبة المدرسية جزءاً لا يتجزأً من النظام التعليمي وأحد أركانه الأساسية، إذ ترتبط ارتباطاً عضوياً بأهداف وبرامج وفلسفة النظام التعليمي المتبع في المراحل الابتدائية والمتوسطة والثانوية. فالمكتبة ليست كياناً منعزلاً بل هي مكملة لبرامج المدرسة وخدماتها، وتتأثر أهدافها ومشكلاتها بمشكلات وأهداف المنظومة التعليمية ككل. والنظام التعليمي الحديث لا يقف عند حد تحفيظ التلاميذ وتلقينهم قدراً معيناً من المعلومات في موضوعات مختلفة، بل يهدف بالدرجة الأولى إلى إعداد المواطن الصالح القادر على العطاء والإسهام في بناء مجتمعه، وذلك عن طريق تدريبه على أساليب التعلم الذاتي والتفكير العلمي وتنمية شخصيته ومهاراته بالتفاعل مع حاجات المجتمع ومشكلاته، مع الاعتماد على قدرات الطالب ورغباته واهتماماته. وهذا يتطلب إعادة تعريف دور المكتبة المدرسية بحيث لا تقتصر على كونها مكاناً لحفظ الكتب فقط بل تكون محوراً رئيسياً في العملية التعليمية والتربوية المتكاملة التي تهدف إلى بناء شخصية الطالب بشكل شامل ومتكامل من جميع الجوانب الفكرية والعلمية والثقافية والاجتماعية. فالمكتبة هي الفضاء الذي يتيح للطالب التفاعل الحر مع المعرفة من خلال مصادر متنوعة تعزز قدراته الإبداعية والنقدية وتنمي فيه حب الاستكشاف والبحث المستمر الذي يمتد معه طوال حياته.\n\n### أنواع المكتبات المدرسية وتنوعها الوظيفي\n\nمصطلح المكتبة المدرسية هو مصطلح عام يضم أنواعاً متعددة من المكتبات، فهناك مكتبة المدرسة الثانوية ومكتبة المدرسة المتوسطة ومكتبة المدرسة الابتدائية، وكذلك مكتبات الأطفال ومكتبات الفصول الدراسية. وتوجد أيضاً مكتبات مدرسية مركزية وأخرى نوعية، وتدخل هذه وتلك في شبكة متناسقة من المكتبات ترتبط أحياناً بالمكتبات العامة وغيرها من مكتبات الدولة. وقد حرصت الدول المتقدمة على الاهتمام بالمكتبة المدرسية اهتماماً ملحوظاً، حيث وضعت لها مقننات في الأداء وبرامج مخططة لخدمة العملية التعليمية وتنمية شخصية الطالب من النواحي العلمية والاجتماعية والثقافية. ويتفاوت حجم المكتبات المدرسية وتنوع مقتنياتها تبعاً للمرحلة الدراسية التي تخدمها، فمكتبة المرحلة الابتدائية تركز على الكتب المصورة والقصص البسيطة والمواد التي تناسب الأطفال في مراحلهم العمرية المبكرة، بينما مكتبة المرحلة المتوسطة تتنوع مصادرها لتشمل مراجع مبسطة ودوريات مناسبة، ومكتبة المرحلة الثانوية تحتاج إلى مراجع ودوريات ومصادر متخصصة تلبي احتياجات الطلاب في مرحلة النضج الفكري والبحث العلمي الأولي. أما مكتبات الفصول فهي وحدات صغيرة داخل الفصول الدراسية توفر مجموعة أساسية من الكتب والمواد المرجعية السريعة التي يحتاجها الطلاب أثناء الحصص الدراسية مباشرة دون الحاجة للانتقال إلى المكتبة الرئيسية.\n\n### التحول من المكتبة المدرسية إلى مركز مصادر التعلم\n\nشهد مفهوم المكتبة المدرسية تحولاً جوهرياً في الاستخدامات المعاصرة، حيث أصبح يطلق عليها مركز الوسائل التعليمية أو المكتبة الشاملة أو مركز مصادر التعلم. ويرجع هذا التحول إلى عدة عوامل أساسية: أولها تعدد الأوعية التي تسجل عليها المعرفة وتحفظ بالمكتبة، وثانيها تعدد أساليب توصيل المعلومات إلى المستخدمين. فقد أصبحت الوسائل السمعية والبصرية كالأفلام والشرائط والشرائح وأشكال الميكروفيلم في متناول يد الطلاب والأساتذة إلى جانب الكتب والمواد المطبوعة. ونظراً لارتباط المكتبة المدرسية بالبرامج والمقررات والمناهج التي تميل إلى التنوع والبحوث المستقلة، فقد ظهرت أهمية المكتبة المدرسية بمصادرها المختلفة المطبوعة وغير المطبوعة في الارتقاء بالعملية التعليمية وتحديثها وتحقيق أهدافها بكفاءة. فالطلاب يستعينون بأوعية متعددة في عملية التعليم ويستعينون بأمناء المكتبات المدرسية في اختيار تلك المواد واستخدامها الاستخدام الأمثل. ويركز برنامج تعليم استخدام المكتبة على تعريف التلاميذ بمهارات الاستماع والمشاهدة والملاحظة فضلاً عن الإفادة من الأفلام العلمية والشرائط والأفلام السينمائية وغيرها من المواد السمعية البصرية المتاحة في مركز مصادر التعلم. وقد أضافت التقنيات الحديثة أبعاداً جديدة لمفهوم مركز مصادر التعلم تشمل الحاسب الآلي والبرمجيات التعليمية والإنترنت وقواعد المعلومات الإلكترونية.\n\n### الأهداف التربوية للمكتبة المدرسية وتشجيع القراءة\n\nترتبط الأهداف التربوية للمكتبة المدرسية بالأساليب المؤثرة في المنهج والبرنامج الدراسي وبنشاط الطالب والمدرس خارج المنهج، وتشمل عدة محاور رئيسية. أولاً: تشجيع القراءة الحرة بغرس وتنمية عادة القراءة والاطلاع لدى الطلاب، ذلك أن الهدف العام من الخدمة المكتبية هو جعل القراءة والكتاب جزءاً أساسياً من حياة الفرد اليومية. فالمكتبة مكملة للمنهج التعليمي والطفل يسعى بنفسه لقراءة القصص والكتب المصورة بعد تعلم مبادئ القراءة، وإذا ما وُفر للطفل الكتاب المناسب مادة وإخراجاً استطاع المعلم أن يستغل ميول الأطفال ويوجههم للقراءة التي تتفق مع مستوياتهم الذهنية وميولهم الفكرية، ويشجعهم على القراءة الحرة في هذه السن المبكرة التي قد تستمر معهم طوال حياتهم. وتتنوع أنواع القراءة لتشمل القراءة التحصيلة الدراسية، والقراءة من أجل تجميع المعلومات لغرض واحد، والقراءة للمتعة الذهنية واستثمار أوقات الفراغ، والقراءة للتذوق الأدبي، والقراءة النقدية التحليلية. ثانياً: توجيه الطلاب إلى أساليب القراءة السليمة عن طريق الإرشاد القرائي السديد، وهذا يتطلب التعرف على مشكلات الطلاب القرائية وتذليلها، ودراسة ميولهم القرائية والاستجابة لتنميتها، وتوفير مجموعات من المواد المكتبية المتنوعة المناسبة لمستوياتهم القرائية المتدرجة من السهل إلى الصعب. ومن الملاحظ أن الطلاب لا يقبلون على القراءة الهادفة بل يؤثرون القراءات السهلة التي لا تضيف الكثير، لذلك يجب أن يتعامل الإرشاد القرائي مع كل طالب على أنه فرد مستقل له ميوله الخاصة واحتياجاته المتميزة وخصائصه الفردية.\n\n### تعليم مهارات استخدام المكتبة والتربية المكتبية\n\nتعد المعلومات التي يتلقاها الطالب من معلمه في قاعة الدراسة غير كافية أمام أهمية تعليم الطلاب كيفية الحصول على المعلومات بأنفسهم وبمجهودهم الشخصي. وهذا يتطلب التعرف على المراجع والدوريات والمخطوطات والموسوعات والقواميس وكيفية استخدامها، والتعرف على نظام الفهرسة الوصفية والموضوعية والتصنيف وكيفية الاستفادة منه، فضلاً عن التعرف على كيفية إعداد ورقة البحث وجمع المعلومات من المصادر المتعددة وتلخيصها وتنظيمها. وهناك طريقتان رئيسيتان تتبعان في التربية المكتبية لتعليم مهارات المكتبة: التوجيه الفردي لكل طالب عند نشوء موقف تعليمي يتطلب مهارة مكتبية معينة ومواجهة مشكلة في استخدام المكتبة، وذلك أن في كل مرة يسأل فيها الطالب سؤالاً وتتم الإجابة الصحيحة عنه من خلال مصادر المكتبة فإنه تتم عملية تعلم فعالة. والطريقة الثانية هي التدريس أو التدريب الجماعي مع العناية أيضاً بالتوجيه الفردي خلال التدريب الجماعي. وأفضل الطرق الفعالة لتحقيق هذا الهدف هي ربط المهارة المكتبية بالخبرة التعليمية أي التكامل بين المنهج الدراسي والتربية المكتبية، ذلك أن الكتاب المدرسي يعطي إجابات محددة عن موضوعاته بينما المكتبة تقدم مصادر متنوعة بآراء متعددة وهذا يتطلب بالضرورة تعليم الطلاب كيفية الوصول إلى الإجابات بأنفسهم من خلال البحث والتنقيب في مصادر المعرفة المتاحة. ويمتد هذا التعليم طيلة مراحل الدراسة المختلفة ويتطور باستمرار بما يتناسب مع قدرات الطلاب المتنامية واحتياجاتهم المتجددة.\n\n### توفير المصادر التعليمية ودور المناهج الحديثة\n\nيعد توفير المصادر التعليمية المتعددة الأوعية والأشكال من أهم وظائف المكتبة المدرسية إذ بدون ذلك لا يمكن النهوض بالوظائف الأخرى للمكتبة وتقديم خدماتها بكفاءة. فتوفير المصادر التعليمية ليس مقصوداً لذاته وإنما هو وسيلة المكتبة في تقديم خدماتها لتدعيم المناهج الدراسية والأنشطة التربوية. والمكتبة تقوم بتزويد المدرسين بالمواد المكتبية والتقنيات التربوية السمعية والبصرية المرتبطة بموضوعات تدريسهم اليومي أو بمواد تخصصهم أو بمجالات النشاط المدرسي الذي يشرفون عليه. كل هذا يتطلب توفير مجموعات يحسن اختيارها ويحسن إعدادها فنياً للتداول عن طريق الفهرسة والتصنيف وإعداد رؤوس الموضوعات اللازمة وإعداد الببليوجرافيات الموضوعية لتكون جزءاً أساسياً من الخدمة المكتبية. كما تسهم المكتبة المدرسية في إزالة الحواجز التقليدية بين المقررات الدراسية والأنشطة التربوية المدرسية لتحقيق التكامل بين المناهج والأنشطة. فقد غيرت الاتجاهات التعليمية الحديثة المفهوم التقليدي وأصبح الاهتمام بالتعلم الذاتي واحتياجات الفرد وميوله جزءاً من العملية التربوية. فالكتاب المدرسي أصبح إطاراً عاماً يحدد الاتجاهات والمفاهيم الأساسية ويترك للطالب حرية البحث والتنقيب بنفسه من المصادر التعليمية المتاحة بالمكتبة بإشراف أمين المكتبة والتعاون مع أستاذ المادة.\n\n### دور المكتبة في تنمية التفكير العلمي والابتكاري والخدمة المجتمعية\n\nمن الأهداف المهمة للمكتبة المدرسية تنمية الاتجاهات والقيم الاجتماعية التي يرتضيها المجتمع وإكساب الطلاب مهارات التعلم الذاتي والتفكير العلمي والتفكير الابتكاري. فالمناهج الحديثة غيّرت المفهوم التقليدي الذي كان يعتمد على تخزين المعلومات المقررة واسترجاعها عند الامتحان دون مراعاة لتنمية شخصية الطالب أو الاهتمام بميوله ومشكلاته. أما المناهج الحديثة فقد أصبحت تتيح للطالب فرص البحث والتمحيص والاطلاع الهادف الذي يلمي فيه مهارات وفيرة منها مهارات التفكير العلمي المنظم في مواجهة الأمور والمشكلات مما يوسع مداركه وآفاقه العلمية ويكسبه مهارات التفكير الابتكاري. كما أن للمكتبة دوراً مستقلاً يتجاوز حدود المساعدة ويتمثل في إصدار النشرات واللوحات وإعداد البرامج الإذاعية وتنظيم الندوات والمحاضرات والحديث عن الكتب وعرض ملخصاتها وإقامة مسابقات القراءة الحرة وتشكيل جماعة أصدقاء المكتبة وتدريبهم على العمل التطوعي الجماعي في الأعمال التنظيمية داخل المكتبة. وتخدم المكتبة البيئة المحيطة بفتح أبوابها في غير أوقات الدراسة لجميع الراغبين من أولياء الأمور وأفراد المجتمع المحلي مما ينعكس إيجاباً على البيئة المحلية ويعزز دور المدرسة كمركز إشعاع ثقافي وتعليمي. وأخيراً تسهم المكتبة في تنمية مهارات المعلمين باعتبارها المرفق الوحيد الذي تتوفر فيه المصادر التربوية لمناهج الدراسة على اختلاف أشكالها، وتستدعي هذه التنمية مواصلة المعلم للاطلاع المستمر طوال حياته الوظيفية لأن توقف المعلم عن الاطلاع يؤثر سلباً على العملية التعليمية والتربوية بكاملها.\n\n### الأنشطة التربوية ودورها التكاملي مع المكتبة المدرسية\n\nتلعب الأنشطة التربوية المدرسية دوراً محورياً في تحقيق العديد من الأهداف التربوية التي تسعى إليها المكتبة المدرسية. ومن أبرز هذه الأهداف تمكين الطلاب من ممارسة النشاط الفردي والجماعي تبعاً لميولهم وقدراتهم المختلفة، مما يعزز شخصياتهم ويطور مهاراتهم الاجتماعية والتعاونية. كما تسهم هذه الأنشطة في تدعيم وإثراء المناهج الدراسية من خلال إزالة الحواجز التقليدية بين المواد الدراسية المختلفة والربط بين المفاهيم والمعلومات المتنوعة. كذلك تساعد الأنشطة التربوية في الانتفاع بأوقات الفراغ واستثمارها في أعمال مفيدة تخدم الطالب والمجتمع على حد سواء. وتتيح هذه الأنشطة للطلاب اكتساب خبرات ومهارات في حل المشكلات في جو تربوي ديمقراطي خارج حجرات الدراسة مما يوسع آفاقهم المعرفية والاجتماعية. وكل هذا يتم من خلال الجمعيات المدرسية تحت إشراف المدرسين والمتخصصين بالتعاون مع المكتبة المدرسية لتدعيم هذه الأنشطة بتوفير كل ما يلزمها من الأوعية والمصادر المتاحة. وبذلك تتحقق الفلسفة الشاملة للمكتبة المدرسية كمركز لمصادر التعلم الذي يربط بين التعليم النظامي والأنشطة التربوية الحرية في إطار متكامل يخدم أهداف العملية التربوية بأكملها. وتبرز في هذا السياق أهمية التخطيط العلمي السليم لبرامج وأنشطة المكتبة المدرسية بما يضمن تحقيق أقصى استفادة ممكنة من الإمكانات المتاحة وصولاً إلى تحقيق جودة شاملة ومتكاملة في الأداء المكتبي المدرسي.",
  "ch5": "المكتبات الأكاديمية ودورها في خدمة التعليم والبحث العلمي والمجتمع\n\n### تقديم: مفهوم المكتبات الأكاديمية وأشكالها المتنوعة\n\nتختلف أشكال وأنواع المكتبات الأكاديمية باختلاف المعاهد العليا التي تخدمها تلك المكتبات، فعلى الرغم من أن الوظيفة الرئيسية للمكتبة الأكاديمية تتركز في تقديم المصادر والخدمات المكتبية التي تحقق الأهداف والبرامج التعليمية للمعهد الذي تنتمي إليه، إلا أن كل شكل من أشكال المكتبات الأكاديمية له خصائصه ومشكلاته المتميزة. وتتنوع المكتبات الأكاديمية لتشمل مكتبات المعاهد المتوسطة كالمعاهد الزراعية والتجارية والصناعية ومعاهد المعلمين وغيرها من المعاهد المهنية التي يدرس فيها الطالب لمدة سنتين بعد الثانوية العامة، وكذلك المكتبات الجامعية المركزية ومكتبات الكليات المتنوعة التي تقدم دراسات لمدة أربع سنوات بعد الثانوية. وتشترك جميع أنواع المكتبات الأكاديمية في هدفها الرئيسي المتمثل في دعم العملية التعليمية والبحث العلمي من خلال توفير المصادر والخدمات المناسبة للمستفيدين، إلا أن حجم هذه المصادر ونوعيتها وطريقة تقديمها تختلف تبعاً لطبيعة المعهد الذي تخدمه ومستوى الدراسة فيه وعدد المستفيدين وحجم البرامج التعليمية والبحثية المقدمة والتفاصيل الدقيقة للاحتياجات الأكاديمية لكل مؤسسة تعليمية على حدة.\n\n### مكتبات المعاهد المتوسطة وخصائصها ومقتنياتها وخدماتها\n\nتستجيب مكتبات المعاهد المتوسطة لاحتياجات خريجي المدارس الثانوية الذين لا يستطيعون مواصلة تعليمهم الجامعي لمدة أربع سنوات، إذ تزود المعاهد طلابها بالمهارات المهنية والتعليم العالي اللازم للقيام بكفاءة بالأعمال المساعدة والفنية في المجالات التعليمية والتجارية والصناعية والزراعية وغيرها من المجالات المهنية المتنوعة. كما أن التعليم في المعاهد المتوسطة من شأنه أن يعد بعض الطلاب لمواصلة تعليمهم الجامعي بعد التخرج. وعليه يجب أن تخطط المكتبة مجموعتها لتشمل مختلف الموضوعات التي يقوم المعهد بتدريسها بحيث تستجيب لاحتياجات الطلاب من حيث أعمارهم وخلفياتهم الثقافية ومستوياتهم الفكرية وأهدافهم المهنية. كما ينبغي أن تشمل مجموعات المكتبة أشكالاً مختلفة كالكتب والدوريات والنشرات والمصادر التعليمية والوسائل السمعية والبصرية والأدوات المرجعية والببليوجرافية فضلاً عن المواد الترويجية للقراءة الحرة. ويجب أن تقدم المكتبة برنامجاً رسمياً أو غير رسمي في تعلم استخدام المكتبة والمراجع وتشجيع الاطلاع والقراءة عن طريق إقامة المعارض وندوات مناقشة الكتب وغيرها من الأنشطة الثقافية الداعمة. ويجب أن يكون أمين مكتبة المعهد ذا خلفية علمية عريضة وعلى دراية كافية بالإنتاج الفكري في المجالات الموضوعية التي يغطيها المعهد حتى يسهم بدور إيجابي في اختيار المواد المناسبة ويتمكن من خدمة طلاب وأساتذة المعهد في مجالات التعليم والتدريب المختلفة.\n\n### مكتبات الكليات وتطور وظائفها التاريخي والمعاصر\n\nتوجد أنواع عديدة من الكليات التي تقدم دراسات في العلوم أو الآداب أو الدراسات المهنية لفترة أربع سنوات بعد الثانوية العامة عادة، وقد تضم الكلية عدداً من الطلاب يتراوح بين بضع مئات إلى حوالي عشرة آلاف طالب. وقد تطورت وظيفة مكتبة الكلية تطوراً كبيراً؛ ففي أوائل القرن العشرين ركزت مكتبات الكليات على الحصول على المواد المكتبية والحفاظ عليها وتخزينها، وكان الكتاب المقرر هو الوسيلة التعليمية الرئيسية والوحيدة تقريباً. وقد شهدت هذه المكتبات تحولات كبيرة في أساليب عملها وبرامجها المقدمة، أما في الوقت الحاضر فقد تطورت لتشجيع استخدام المصادر التعليمية المتعددة وتقديم واختيار المواد التي تخدم البرنامج التعليمي في الكلية، مع تقديم خدماتها لساعات أطول والحصول على مجموعات ومقتنيات كبيرة واتباع سياسة أكثر مرونة للإعارة وتعليم الطلاب كيفية استخدام المكتبة والفهارس والمراجع وإعداد البحوث العلمية. وقد فرض التطور العلمي والتكنولوجي المعاصر على الكليات المختلفة تقديم دراسات تخصصية متعددة وتطوير المناهج وطرق التعليم والاستفادة من المصادر المطبوعة وغير المطبوعة التقنية. وحتى تؤدي مكتبة الكلية هذه المهام المتنوعة يجب أن يكون الأمناء المهنيون ذوي خلفية علمية عريضة مع تخصص موضوعي في واحد أو أكثر من الدراسات فضلاً عن المقدرة اللغوية في إحدى اللغات الأجنبية والإحاطة بالتطورات العامة في مجالات التعليم الجامعي والمناهج وطرق التدريس. ويتلاءم التنظيم الإداري لمكتبة الكلية مع احتياجاتها وبرامجها ويتأثر بحجم الطلاب وأعضاء هيئة التدريس وحجم الدراسات الأولية والعليا وحجم مجموعات المكتبة.\n\n### المكتبة الجامعية والجذور التاريخية للتعليم العالي العالمي\n\nالجامعة هي معهد للتعليم العالي يقدم دراسات في مرحلة البكالوريوس وفي مرحلة الدراسات العليا. ولما كانت المعرفة الإنسانية ميزة مشتركة عالمياً فإن جامعات العالم تأخذ من بعضها أساليبها وطرائقها وتتبادل المعلومات فيما بينها. وقد كانت المعاهد العلمية العربية في بغداد وقرطبة والقاهرة وغيرها منارة للعلم في العصر الوسيط وأخذت أوروبا عن العرب في عصر النهضة الكثير من أساليبهم التعليمية والعلمية. وقد لوحظ تأثير الجامعات الألمانية الواضح على التعليم العالي في أمريكا خلال القرن التاسع عشر، حيث التحق العديد من الطلاب الأمريكيين بالجامعات الألمانية المشهورة بالمستوى العالي في البحث العلمي، كما أخذت الجامعات الأمريكية عن الألمانية نظام الدراسة عن طريق الحلقات الدراسية وهو النظام الذي كان متبعاً قبل ذلك في أقدم جامعات الدنيا وهو الأزهر الشريف. كما أخذت الجامعات الأمريكية عن الألمانية اتباع الطريقة المختبرية إلى جانب المحاضرة، وقد أدت هذه الأساليب الحديثة في التعليم إلى زيادة كبيرة في استخدام المكتبات الجامعية. وفي القرن العشرين ظهر تأثير التعليم العالي الأمريكي والبريطاني والفرنسي والألماني على الجامعات العربية ومكتباتها مما أحدث تطوراً في مفاهيم الخدمة المكتبية الجامعية وأساليب تقديمها وأدواتها المتنوعة.\n\n### أهداف ووظائف المكتبات الجامعية وخدماتها البحثية\n\nلما كان البرنامج التعليمي والبحثي يمتد من السنة الأولى الجامعية إلى الدكتوراه فينبغي على المكتبة الجامعية أن تقدم مصادرها وخدماتها بما يتلاءم مع هذا البرنامج الطويل والمعقد. كما يجب أن تستجيب لبرامج الجامعة المتعلقة بالتعليم المستمر وبرنامج النشر والاهتمام بمطبوعات الجامعة باعتبارها مركز إيداع لهذه المطبوعات ومركز التعريف والترويج لها. وعليها أن تحصل على مجموعات في مختلف المجالات العلمية من أحدث الطبعات فضلاً عن اقتناء المواد ذات القيمة التاريخية والمراجع العامة والتخصصية والمواد التي تخدم المناهج الدراسية والبحوث بلغات متعددة. وتحقق المكتبة الجامعية وظائف أساسية تشمل: اختيار المواد المكتبية المختلفة والحصول عليها بمختلف الوسائل، وتنظيم وفهرسة تلك المواد وإعداد التسجيلات الببليوجرافية، وتسجيل وترقيم المواد لإثبات ملكيتها ومكان وجودها ومصدر الشراء، وتجليد وصيانة المواد لضمان استخدامها للأجيال القادمة، وإعارة المواد وإتاحتها للمجتمع الأكاديمي، وتقديم خدمات التعليم الفردي والجماعي، وتوفير أماكن للقراءة والدراسة الخاصة بالباحثين وطلاب الدراسات العليا، وإرساء قواعد التعاون مع المكتبات والهيئات الأخرى. وتتميز مكتبة الجامعة عن مكتبة الكلية بتقديم مطبوعات في مجالات أوسع وما يخدم الدراسات العليا والبرامج المهنية المتقدمة، كما تقتني المصادر الثانوية كالدوريات الكشفية والمستخلصات ومصادر المراجعات.\n\n### التنظيمات الإدارية للخدمات الجامعية ومتطلبات الكوادر البشرية\n\nتتعدد التنظيمات الإدارية لمكتبة الجامعة لكن الاتجاه العام يعتمد على المكتبة الجامعية المركزية التي تهتم بخدمة طلاب الدراسات العليا وأعضاء هيئة التدريس والباحثين مع اقتناء المراجع العامة والتخصصية وتقديم خدمات التصوير والوسائل السمعية البصرية وخدمات المعلومات، ومكتبات لخدمة طلاب المرحلة الجامعية الأولى التي قد تحتل مبانٍ مستقلة أو تكون داخل المكتبة المركزية. وقد تتبنى بعض الجامعات فكرة مكتبة واحدة مركزية تضم جميع المقتنيات والخدمات مع توفير تسهيلات للطلاب. ولا يمنع هذا الأقسام العلمية من امتلاك مكتباتها المستقلة للحصول على مجموعات متفرقة كالرسائل العلمية والتقارير الفنية. وتتأثر التنظيمات بعوامل عديدة أهمها حجم الطلاب وأعضاء هيئة التدريس والموقع الجغرافي وتوفر المباني والأمناء المهنيين. وتقدم المكتبة خدمات إرشاد الطلاب وإحاطتهم بالببليوجرافيات وتعليمهم استخدام المصادر والتعريف بالإنتاج الفكري وخدمات الترجمة والتصوير والطباعة. ويجب أن يكون مدير المكتبة قادراً على تطوير وإدارة الحياة الفكرية وتفسير برنامج المكتبة لضمان التمويل. كما ينبغي أن يكون الأمناء ذوي خلفية تعليمية عريضة مع تخصص موضوعي أو لغوي أو في أشكال المواد كالتقارير وبراءات الاختراع أو في إرشاد القراء وطرق البحث العلمي المتخصصة.\n\n### المشكلات والتحديات المعاصرة والاتجاهات المستقبلية\n\nتنتج كثير من مشكلات المكتبات الأكاديمية من نمو وتطور المؤسسات التعليمية التي تخدمها، حيث تتأثر بزيادة عدد الطلاب المقبولين بالجامعة وزيادة البرامج التعليمية على مستوى البكالوريوس والدراسات العليا وكذلك بزيادة البرامج البحثية التخصصة التي تتطلب مصادر متنوعة يصعب الحصول عليها لندرتها أو ارتفاع أثمانها. وتستلزم هذه التطورات المتسارعة المزيد من الخدمات والمصادر والموظفين بالمكتبة والمزيد من الاعتمادات المالية والاستثمارات في المباني والتوسعات الضرورية وتوظيف المؤهلين ذوي التخصصات الموضوعية المتنوعة لخدمة المراجع وإعداد الببليوجرافيات والتعامل مع التقنيات الحديثة. وتضاف إلى ذلك مشكلات الحصول على المواد النادرة أو ذات الأسعار المرتفعة وضرورة تطوير نظم الإعارة البينية بين المكتبات الجامعية وتحقيق التعاون المتبادل في مجالات تبادل المعلومات والمصادر بين المؤسسات الأكاديمية المختلفة. كما أن مكتبة البحث تتطلب تحقيق نسبة عالية من المجلدات لكل طالب وقد تحتوي على ملايين المجلدات في البلاد المتقدمة. وكل هذه التحديات تتطلب تخطيطاً استراتيجياً شاملاً يراعي متطلبات العصر ومستقبل التعليم العالي والبحث العلمي والاستفادة من التطورات التقنية المتسارعة في مجال المكتبات والمعلومات.\n\n### نماذج من المكتبات الجامعية الحديثة واتجاهات التطوير\n\nتعد المكتبات الجامعية الحديثة نموذجاً يحتذى به في مجال تطوير الخدمات المكتبية الأكاديمية. ومن أبرز هذه النماذج مكتبة جامعة برادفورد التي تطورت خدماتها بشكل ملحوظ لتبني نموذجاً متميزاً في الخدمة المكتبية الأكاديمية الحديثة التي تتميز بتنظيمها الفريد الذي يركز على توفير بيئة تعليمية متكاملة تجمع بين الموارد المطبوعة والإلكترونية والخدمات الإرشادية المتطورة، مع توفير مساحات مرنة للدراسة الجماعية والفردية مجهزة بأحدث التقنيات الرقمية والأنظمة الإلكترونية المتطورة التي تسهل الوصول إلى المعلومات وتبادلها بين الباحثين والمستفيدين من الخدمات المكتبية. كذلك مكتبة جامعة سوث هامبتون التي اهتمت بتقديم خدمات متخصصة للباحثين وطلاب الدراسات العليا مع نظام متطور للوصول إلى المصادر الإلكترونية وقواعد المعلومات العالمية. وقد اهتمت هذه النماذج الحديثة بتطوير مهارات الأمناء المهنيين وتأهيلهم للتعامل مع التقنيات الحديثة وتقديم خدمات مرجعية متقدمة تشمل البحث عن طريق شبكات المعلومات والاستفادة من قواعد البيانات الببليوجرافية العالمية. كما ركزت هذه المكتبات على تحقيق أعلى مستويات التعاون بين المكتبات الجامعية على المستوى الوطني والدولي في مجالات الإعارة التبادلية والوصول المشترك للمصادر الإلكترونية وتبادل الخبرات المهنية بين العاملين في مجال المكتبات الأكاديمية، مما يعكس اتجاهاً واعداً نحو تطوير أكمل وأكثر شمولاً لخدمات المكتبات الأكاديمية في المستقبل.\n\n### الخاتمة: مستقبل المكتبات الأكاديمية\n\nتتجه المكتبات الأكاديمية المعاصرة نحو التحول الرقمي الشامل حيث أصبحت المكتبة الإلكترونية والوصول المفتوح للمعلومات من أهم الاتجاهات التي تعيد تشكيل مفهوم الخدمة المكتبية الأكاديمية في العالم. وهذا يتطلب من أمناء المكتبات تطوير مهاراتهم التقنية والرقمية بشكل مستمر لمواكبة هذه التحولات الكبيرة. وتتطلب هذه التحولات استثمارات كبيرة في البنية التحتية الرقمية وتدريب الكوادر البشرية وتطوير نظم المعلومات والفهارس الإلكترونية المتقدمة والشاملة.",
  "ch6": "### مقدمة: الرقمنة والاختزان الرقمي\n\nتتبع المكتبات الرقمية في تنمية مقتنياتها أحد أسلوبين أساسيين: أولهما الاعتماد على المصادر الرقمية المولدة إلكترونيًا والمعروفة بالمصادر المولدة رقميًا، وثانيهما رقمنة المصادر التقليدية المطبوعة أو المصورة أو المسجلة على أوعية غير رقمية. ويتناول هذا الفصل جهود مرافق المعلومات في مصر لرقمنة مصادر المعلومات المختلفة، والإجراءات المتبعة في ذلك، والتقنيات المستخدمة في سياق الممارسات العالمية في هذا الصدد. كما يعرض أساليب الاختزان والحفظ الرقمي للمصادر الرقمية والمرقمنة، ومدى تطبيقها في المشروعات محل الدراسة. ويعد هذا الفصل من أهم فصول الكتاب لأنه يربط بين النظرية والتطبيق في مجال تحويل المصادر التقليدية إلى مصادر رقمية يمكن التعامل معها في بيئة المكتبة الرقمية.\n\n### مفهوم الرقمنة وتعريفها\n\nالرقمنة هي العملية التي يتم بمقتضاها تحويل البيانات إلى شكل رقمي لمعالجتها بواسطة الحاسب الآلي. وعادة ما يستخدم مصطلح الرقمنة في نظم المعلومات للإشارة إلى تحويل النص المطبوع أو الصور إلى إشارات ثنائية باستخدام أحد أجهزة المسح الضوئي، بحيث يمكن عرضها على شاشة الحاسب الآلي. وتتضمن عملية الرقمنة مجموعة من الخطوات المتتابعة والمترابطة التي تبدأ باختيار المصادر المراد تحويلها وتنتهي بإتاحتها للمستفيدين عبر الشبكات الإلكترونية أو الأقراص المدمجة. ومن خلال الدراسة الميدانية التي شملت تسع مكتبات تبين أن خمس مكتبات منها تقوم بمشروعات رقمنة لمصادر المعلومات، بالإضافة إلى ثلاثة مرافق معلومات أخرى تتولى تنفيذ مشروعات رقمنة بشكل مستقل أو بالشراكة مع جهات أخرى.\n\n### مشروعات الرقمنة في مصر\n\nتعددت مشروعات الرقمنة في مصر وتنوعت المصادر التي تشملها بشكل ملحوظ. فقد قامت دار الكتب المصرية برقمنة المخطوطات باعتبارها المؤسسة الأولى المعنية بحفظ التراث الوطني المصري. ومكتبة الإسكندرية أنشأت مكتبة المخطوطات الرقمية بسياسة واضحة في الصيانة والحفظ. والمكتبة القومية الزراعية رقنت الدوريات العلمية المتخصصة في مجال الزراعة. ومكتبة المنظمة العربية للتنمية الإدارية أنشأت قاعدة الاستشهادات المرجعية في مجال الإدارة والتنمية الإدارية. ومكتبة مبارك العامة أنشأت مكتبة الفيديو الرقمية لندواتها وفعالياتها. والشبكة القومية للمعلومات بأكاديمية البحث العلمي نفذت مشروع ستارز لرقمنة النصوص الكاملة للدوريات المصرية. ومركز توثيق التراث الحضاري نفذ مشروعات متنوعة في رقمنة التراث المصري بجميع أشكاله. ومركز الدراسات والموسوعات الإسلامية بالمجلس الأعلى للشئون الإسلامية ركز على رقمنة الكتب المطبوعة المتعلقة بالإرشاد والدعوة الإسلامية. وتتنوع أشكال المصادر المرقمنة بين المخطوطات والدوريات العلمية والكتب والفيديو والمواد السمعية والصور والخرائط والمواد ثلاثية الأبعاد وقطع الأقمار الصناعية.\n\n### أهداف عمليات الرقمنة\n\nإن التحديد الدقيق لأهداف مشروع الرقمنة يُعد من أهم خطوات التخطيط للمشروع؛ إذ يترتب عليه مجموعة من القرارات على المستويين التقني والوظيفي، كما أن له بالغ الأثر في توفير الموارد المالية من المؤسسة الأم أو الدعم المالي من المؤسسات الخارجية. ولا ينبغي أن يكون الدافع وراء مشروعات الرقمنة هو مجرد الخوف من التخلف عن ركب الآخرين، بل ينبغي أن يركز على إنتاج منتج رقمي جيد في ظل حدود التكلفة والإمكانات التقنية وتوافر القوى العاملة. ويمكن إجمال أهداف الرقمنة في ثلاثة أهداف رئيسية: أولًا إتاحة مصادر المعلومات التقليدية على نطاق أوسع، وتشمل الإتاحة على مدار الساعة وطوال أيام الأسبوع، والإتاحة دون التقيد بالموقع الجغرافي للمستفيد، وإنتاج أشكال مختلفة من الملفات للمصدر الواحد حسب الغرض من الاستخدام، وتوصيل المعلومات للمستفيد دون التدخل البشري المباشر، وتجديد استخدام المصادر المتهالكة والتالفة من خلال النسخ الرقمي، وتطوير الخدمات التقليدية للمكتبة، والمشاركة في الموارد بين المكتبات ومرافق المعلومات. ثانيًا صيانة وحفظ المجموعات ضد التلف والكوارث والفقد، وهو هدف بالغ الأهمية خاصة بالنسبة للمخطوطات النادرة والوثائق التراثية التي لا يمكن تعويضها. ثالثًا تحقيق عائد مادي من خلال بيع المنتج الرقمي على أقراص مدمجة أو إتاحته على الشبكة، ولا يقصد بالعائد هنا الاتجار التجاري بل الحصول على عائد مالي يغطي هامشًا من تكلفة المشروع لضمان استمرار العمليات وتحمل نفقات الصيانة والتطوير المستمر.\n\n### أسس تقييم المجموعات لأغراض الرقمنة\n\nتتوقف أولويات اختيار المصادر التي سيتم رقمنتها على مجموعة من العوامل التي تتفاوت بحسب نوع المكتبة والمجتمع الذي تخدمه. وقد حدد هازن ورفاقه ستة عوامل رئيسية للتحكم في تحديد الأولوية عند الاختيار، وهي: الطبيعة المادية والفكرية للمواد المراد رقمنتها، وعدد المستفيدين الحاليين والمحتملين وتوزيعهم الجغرافي، وطبيعة الاستخدام الحالي والمحتمل لتلك المصادر، والشكل الرقمي المقترح للمنتج وكيفية وصفه وإتاحته واختزانه رقميًا، وعلاقة المنتج المقترح بغيره من جهود الرقمنة القائمة أو المخططة، وتصورات التكلفة والعائد المتوقع من المشروع. وفي التطبيق المصري جاءت أولوية امتلاك المكتبة لحقوق نشر المحتوى في المرتبة الأولى لارتباط خمسة مشروعات برقمنة مصادر حديثة مقابل ثلاثة مشروعات للمخطوطات. كما أن بعض المشروعات حصلت على تصريحات رقمنة بموجب اتفاقيات مع المؤسسات الناشرة خاصة في مجال الدوريات العلمية الأكاديمية.\n\n### الرقمنة داخليًا مقابل التفويض والتعاقد\n\nقد تتم عمليات الرقمنة داخليًا بالاعتماد على الموارد المادية والبشرية المتاحة بالمكتبة أو المؤسسة الأم التابعة لها، أو خارجيًا من خلال التعاقد مع شركة تجارية متخصصة أو الشراكة مع مؤسسات خارجية. ولكل من البديلين مزاياه وعيوبه؛ فالرقمنة الداخلية تعطي المكتبة قيمة مضافة تتمثل في توافر التجهيزات والعمالة المدربة للمشروعات المستقبلية، بينما يوفر التعاقد الخارجي تكاليف شراء الأجهزة والعتاد وصيانته مع ضمان الخبرة المتخصصة. وقد ترجع أسباب تفضيل التعاقد الخارجي إلى تكلفة توفير العتاد اللازم في ظل الميزانية المحدودة، وعدم توافر العمالة المتخصصة مثل أخصائيي الجرافيك، والجدول الزمني المحدد للمشروع. وفي جميع الأحوال يجب اتخاذ احتياطيات تكفل الحفاظ على حالة الأصول والتزام المتعهد بالمعايير والجدول الزمني.\n\n### تدفق عمليات الرقمنة والمسح الضوئي\n\nترتبط نماذج تدفق عمليات الرقمنة بنوعية المصادر وطريقة التنفيذ داخليًا أو خارجيًا. وتتضمن المراحل الرئيسية عدة خطوات متتابعة: إجراءات ما قبل بدء العمليات للتعرف الدقيق على طبيعة المحتوى وتحديد الإجراءات المناسبة، ثم تجهيز المصادر من حيث السحب من الرفوف وفحص التكرارات وتخصيص أرقام مسلسلة والصيانة المادية، وإنشاء التسجيلة الببليوجرافية والميتاداتا، ثم المسح الضوئي والتحويل، يليه ضبط الجودة للتأكد من اكتمال المسح ومقارنة الملفات بالأصول وفحص أوضاحها، ثم التعرف الضوئي على الحروف وتصحيح الأخطاء، واختزان الملفات بمستودع الوثائق الرقمية وربطها بالتسجيلات الببليوجرافية، وتنفيذ الإجراء النهائي بالنسبة لأصول المصادر، ثم تطبيق آليات الإتاحة.\n\n### أشكال الملفات وتقنيات الرقمنة\n\nتتعدد أشكال الملفات المستخدمة في مشروعات الرقمنة وتتنوع بين ملفات نصية وملفات صور وملفات صوت وفيديو وملفات ثلاثية الأبعاد. وتوصي أفضل الممارسات الدولية بإنشاء ملف أساسي واحد عالي الجودة وغير مضغوط يصلح لجميع الأغراض. ويوصى باستخدام شكل TIFF كملف أساسي لقدرته على التقاط التفاصيل الدقيقة. أما صيغة PDF فقد كثر استخدامها في إتاحة المصادر الرقمية لارتباطاتها التشعبية وتضمين الخطوط وإمكانية التكشيف والبحث. كما يوصى باستخدام لغة التحديد المبسطة الشاملة XML لقدرتها على عكس بنية مكونات الوثيقة مما يحسن عمليات استرجاع النصوص الكاملة. ويرتبط اختيار نوع الماسح الضوئي بطبيعة المحتوى سواء كانت مخطوطات أو مطبوعات مجلدة أو أوراقًا سائبة أو مصادر على ميكروفيلم.\n\n### التعرف الضوئي على الحروف والميتاداتا وضبط الجودة\n\nتنبع أهمية برمجيات التعرف الضوئي على الحروف من الاقتصاد في الوقت والجهد والتكلفة عند إدخال عدد كبير من الصفوف. إلا أن جودة المخرجات تتوقف على وضوح الصفحات والخطوط ودقة الصورة الملتقطة. وتمثل الميتاداتا البيانات الوصفية المرتبطة بالموارد الرقمية وهي عنصر أساسي في تنظيم المصادر وتسهيل الوصول إليها. وتشمل ضبط الجودة فحص الملفات ومقارنتها بالأصول واستخدام برمجيات تحرير الصور لتصحيح البقع والشوائب وتنقيح الإضاءة والتباين وتصحيح ميل الصورة. وتتوقف عملية الاختزان الرقمي على اختيار الأشكال المناسبة للملفات ووسائط الحفظ وضمان إمكانية الوصول إليها على المدى الطويل.\n\n### اختيار أجهزة المسح الضوئي وأنواعها\n\nيعتمد اختيار نوع الماسح الضوئي على طبيعة مصادر المعلومات المراد تحويلها. وتتقسم أجهزة المسح إلى نوعين أساسيين: الماسحات التلامسية مثل الماسحات المسطحة التي تتلامس فيها الوثيقة بسطح الماسحة وتصلح للوثائق السائبة أو التي لا يُضر بملامستها. والماسحات غير التلامسية وتشمل الماسحات الرأسية أو ماسحات الكتب والكاميرات الرقمية والتي لا تحتاج لتلامس المصدر عند التقاط صورة له. وتتميز ماسحات الكتب بالحد من مخاطر إتلاف المصدر أثناء المسح الضوئي بالإضافة إلى تغلبها على مشكلة انحناء أو تقوس الصفحات بسبب التجليد وهو ما يحتاج إلى مزيد من الجهد إذا ما استُخدمت ماسحة مسطحة. إلا أن الماسحات الرأسية مرتفعة الأسعار بشكل ملحوظ. وأمام المكتبة ثلاث حالات محددة تتوقف عليها اختيار نوع الماسح الضوئي: المجلدات التي لا يسمح بتفكيك أوراقها نظرًا لأهمية المصدر نفسه أو تبعًا لسياسة المكتبة في احتفاظها بالنسخة المطبوعة، والأوراق السائبة التي يسمح بتفكيكها من وحداتها المجلدة لأغراض المسح الضوئي، ومصادر المعلومات المخزنة على ميكروفيلم أو ميكروفيش والتي تتطلب أنواعًا متخصصة من الماسحات.\n\n### خطط تسمية الملفات وأساليبها\n\nينتج عن المسح الضوئي عدد كبير من الملفات التي تنتمي لكيان أو مجموعة معينة. ومن ثم لابد من اتخاذ الاحتياطات اللازمة لضمان عدم تكرار تسمية هذه الملفات من خلال وضع خطة تسمية تتسم بالمرونة والوضوح. ومن الأمثلة على ذلك استخدام دليل باسم الدورية ثم أدلة فرعية بالأعداد مع تسمية الملفات داخل كل عدد تبعًا لأرقام الصفحات. وقد تباينت أساليب تسمية الملفات بين المشروعات المصرية: فالمنظمة العربية للتنمية الإدارية تستخدم العنوان باللغة الإنجليزية متبوعًا برقم مسلسل، ومكتبة الإسكندرية تستخدم حرفًا مع تمثيلات رقمية، والمكتبة القومية الزراعية تستخدم دليلًا لكل عدد مع بادئة يضعها البرنامج ثم رقم الصفحة، والشبكة القومية للمعلومات تستخدم تمثيلات لرمز عنوان الدورية ورقم العدد ورقم المقال، ومركز توثيق التراث الحضاري يستخدم رقم المخطوط ورقم الصفحة، والمجلس الأعلى للشئون الإسلامية يستخدم المرجع والفصل والباب واللغة. أما مكتبة مبارك العامة فليس لديها خطة تسمية محددة حيث يحمل الملف المقابل الإنجليزي لاسم الندوات.\n\n### العلاقة بين الرقمنة وخدمة الإمداد بالوثائق\n\nارتبطت بعض مشروعات الرقمنة في مصر بخدمة الإمداد بالوثائق بشكل وثيق. ومن أبرز الأمثلة على ذلك مشروع الشبكة القومية للمعلومات الذي كان امتدادًا طبيعيًا لنشاط الشبكة بعد أن استكملت قاعدة بيانات الدليل الموحد للدوريات. فقد جاءت مرحلة توفير النصوص الكاملة للدوريات المصرية المقتناة بالمكتبات أو تلك المنشورة كتطور منطقي للخدمة. وقد اعتمدت الشبكة في مراحلها الأولى على شكل وسيط قبل التحويل لشكل مخصص ثم التحول المباشر من خلال الماسح الضوئي. كما أن مشروع المنظمة العربية للتنمية الإدارية ركز على الاستشهادات المرجعية في مجال الإدارة وهو ما يدعم بشكل مباشر خدمة الإمداد بالوثائق والبحث في المصادر الأكاديمية المتخصصة. وهذا الارتباط بين الرقمنة وخدمة الإمداد يعكس النظرة الشمولية للمكتبات الرقمية في مصر حيث لا تُنظر إلى الرقمنة كغاية في ذاتها بل كوسيلة لتطوير الخدمات المعلوماتية وتعزيز دور المكتبة في المجتمع الأكاديمي والبحثي.",
  "ch7": "### مقدمة: التخطيط الوطني للمكتبات الرقمية في مصر\n\nتشهد مصر منذ أواخر التسعينيات وبداية الألفية الثالثة طفرة في الاهتمام بإنشاء المكتبات ومرافق المعلومات وتطويرها على كافة المستويات وتصحبها طفرة أخرى في إعداد البنية الأساسية للاتصالات ونظم المعلومات. وهو ما يترتب عليه ضرورة وجود منظومة متكاملة تجمع شمل هذه المؤسسات باختلاف أهدافها ومناشطها على المستوى الوطني في ظل سياسة وطنية واضحة المعالم ومعلنة لتحقيق التكاملية وتجنب تكرار الجهد وترشيد النفقات من خلال المشاركة في الموارد والتغلب على المعوقات الإدارية وتقنين الوظائف وتوحيد المعيارية. وأصبح هذا التكامل ضرورة وطنية من أجل التنمية في إطار وعي بوجود علاقة طردية بين مستوى مرافق المعلومات وتكاملها في الدولة من جانب وما تحققه من تقدم علمي وتقني من الجانب الآخر. ولا يمكن أن يتم التخطيط لمنظومة المكتبات الرقمية بمعزل عن نظام المعلومات بالدولة ذلك أن المكتبات الرقمية لم تستحدث من عدم وإنما هي ابنة شرعية لذلك النظام الذي وفر لها أسباب النشأة وبيئة التطور.\n\n### أهمية المنظومة الوطنية للمكتبات الرقمية\n\nإن المعرفة أساس أي تقدم والسبيل الوحيد للوصول إلى مجتمع أفضل ومن ثم فإن الاهتمام بالمعلومات إنتاجًا وتداولاً أمر لا غنى عنه. ومع تزايد الوعي بأهمية المعلومات واعتبارها موردًا استراتيجيًا حرصت المجتمعات على تنظيم تدفق المعلومات من خلال وضع إطار تنظيمي يلم شعث المؤسسات العاملة في مجال المعلومات جميعها. وتنبع أهمية المنظومة الوطنية للمكتبة الرقمية من أهمية السياسة الوطنية للمعلومات بالدولة والتي يمكن إجمالها في ثلاث نقاط رئيسية: أولًا كفالة تحقيق أقصى إفادة ممكنة من المعلومات لصالح كل فرد في المجتمع من خلال تنظيم تدفق المعلومات. ثانيًا الحد من ازدواجية العمل على المستوى الوطني وتجنب تكرار الجهد وترشيد النفقات. ثالثًا مواكبة التطورات التكنولوجية واستثمارها والتكيف مع النظم العالمية. وقد كانت مصر من أوائل الدول التي لبت دعوة منظمة اليونسكو مع مطلع السبعينات من أجل نشر فكرة التخطيط الوطني للمعلومات ودعم وجودها.\n\n### أركان المنظومة ودعائمها والإطار المفاهيمي\n\nيشير المنطق العلمي إلى أن التخطيط أيًا كان هدفه يجب أن يتم من خلال بيئة من المفاهيم التي يستند إليها وتحدد إطاره العام. ومن بين هذه المفاهيم: مراعاة الظروف والإمكانات المحلية، وإمكانة تطبيق الخطط على مراحل وجدول زمني مدروس بعناية، ووضع المستفيد نصب أعينه كأحد أهم عناصر نجاح الخطط واستمراريتها. وقد لوحظ من خلال مسح الإنتاج الفكري والحقل الميداني أن مجتمع المعلومات الرقمي اتسم بعدة خصائص جوهرية: اعتماده على مستودعات المحتوى الرقمي حيث الأساس هو الإتاحة والوصول بغض النظر عن أماكنها الجغرافية، وأن المحتوى أصبح يحمل معه بياناته الضابطة ولا يحتاج لضبط منفصل، وتغير واضح في الأدوار والوظائف الأساسية لدورة تداول المعلومات حيث لم تعد الوظائف قاصرة على فئة محددة من الأفراد أو الناشرين أو المكتبات، وأن المشابكة وتكاملية النظم هي البنية الأساسية والتوجه الحتمي. وبناء على ذلك يقترح الباحث نموذجًا نظريًا يتلخص في إنشاء نقاط محورية على مستويات قطاعية محددة تمثل مستودعات الكيانات الرقمية يتم الربط بينها باستخدام شبكات الاتصال الموزعة في إطار من النظم والبرمجيات المعيارية.\n\n### الوضع الراهن والتحديات\n\nيعتمد التخطيط الجيد على أساس استقراء الخبرات السابقة والموارد المتاحة. وقد نبهت بولين أثرتون إلى أهمية إجراء مسح شامل للبنية الأساسية والنظم الوطنية القائمة حيث تشكل الخدمات المتوافرة الأساس الذي يُعتمد عليه عند وضع الخطط المستقبلية. ومن خلال الدراسة الميدانية يمكن إجمال الوضع الراهن في عدة ملاحظات جوهرية: أن التخطيط الجيد ودخول المشروعات في منظومة وطنية هو أساس نجاحها كما في التجربة الأمريكية والبريطانية وحتى التجربة الإندونيسية التي بدأت فردية ثم تأطرت بخطة وطنية وهو خلاف الواقع في مصر. وأن النمو المتسارع في مجال المكتبات الرقمية يتطلب مزيدًا من الجهد الموازي وهو عكس التوجهات المصرية. ووجود تفاوت في الممارسة بسبب اختلاف المفاهيم وغياب المعايير والأدلة الاسترشادية. وهناك تداخل كبير بين مشروعات رقمنة المخطوطات يؤدي لإهدار الموارد بسبب غياب التنسيق. وجود جهود مميزة في الضبط الببليوجرافي رغم افتقارها للتنسيق. ونقص واضح في تطبيقات بيئة العمل الموزعة. واستمرار هيمنة المصادر المطبوعة وضعف إنتاج النشر الإلكتروني العربي. وتعدد التبعية الإدارية للمكتبات العامة بين عدة وزارات وهيئات ينبئ بغياب التنسيق وتفاوت المستوى بينها.\n\n### المنظومة المقترحة رؤيتها وأهدافها\n\nتتبلور رؤية المنظومة المقترحة في إتاحة المحتوى الرقمي من خلال تأسيس شبكة وطنية يتقاسم أطرافها مسئوليات جمع وضبط وإتاحة هذا المحتوى وصيانته واختزانه. ولا تسعى المنظومة أن تكون مجرد فهرس موحد للبيانات الببليوجرافية بل مجموعة مستودعات محتوى موزعة تدعمها بوابات الولوج الشاملة والمتخصصة. وقد حدد فريق عمل برنامج المكتبة الرقمية الوطنية بمكتبة الكونجرس عشرة تحديات مقسمة على خمسة محاور: بناء المصادر وتشمل تطوير تقنيات الرقمنة وتصميم أدوات البحث والاسترجاع وأدوات تحسين الفهرسة والوصف، والتشغيل البيني عبر بناء البروتوكولات والمعايير، والملكية الفكرية بتحديد القضايا القانونية المرتبطة بإتاحة المصادر، والإتاحة الفعالة بتكامل المصادر الرقمية والتقليدية وتعميم الفائدة على مختلف فئات المستفيدين وتوفير أدوات مرنة لتحويل المحتوى، ومساندة المصادر بتطوير النماذج الاقتصادية لدعم المكتبة الرقمية الوطنية.\n\n### المسئولية والجهاز الإداري والقطاعات\n\nأوصت العديد من الدراسات والمؤتمرات بضرورة تشكيل جهاز إداري على مستوى حكومي مناسب يتولى إعداد الخطط الوطنية. وقد أوصى المؤتمر العلمي بجامعة القاهرة في نوفمبر 1997 بإنشاء مجلس وطني للمعلومات يكون مقره دار الكتب المصرية. وفي ظل غياب هذا المجلس يقترح الباحث تبنى مشروع المبادرة المصرية للمكتبات الرقمية بمجلس أعلى يتبع رئاسة الجمهورية أو مجلس الوزراء. وتتوزع المسئوليات على ستة قطاعات: قطاع حفظ وصيانة التراث ويضم دار الكتب ومكتبة الإسكندرية ووزارة الأوقاف ومركز توثيق التراث الحضاري، وقطاع التعليم العالي والبحث العلمي ويشمل شبكة المجلس الأعلى للجامعات والمكتبات الجامعية والمكتبة القومية الزراعية والشبكة القومية للمعلومات، وقطاع الثقافة بالمكتبات العامة ومكتبات جمعية الرعاية المتكاملة، وقطاع النظم والاتصالات بوزارة الاتصالات وتكنولوجيا المعلومات، وقطاع المعايير والمواصفات بلجان التوثيق بوزارة الصناعة، والقطاع التجاري باتحاد الناشرين وشركات النظم الآلية.\n\n### البرامج التنفيذية العشرة المقترحة\n\nيقترح الباحث العمل على ثلاثة مستويات متوازية: مشروعات قصيرة الأجل ذات مردود سريع، ومشروعات طويلة الأجل تحتاج تمويلاً ضخمًا يمكن تفتيتها، ومشروعات مستمرة مرتبطة بوجود المبادرة. وتتضمن المرحلة الأولى المقترحة خمس سنوات عشرة برامج تنفيذية: أولًا برنامج المكتبة الرقمية للرسائل الأكاديمية بإنشاء مستودعات موزعة تستضيفها شبكة الجامعات المصرية. ثانيًا برنامج المكتبة الرقمية للمخطوطات لتوحيد جهود رقمنة المخطوطات بين دار الكتب ومكتبة الإسكندرية والمجلس الأعلى للشئون الإسلامية. ثالثًا برنامج الأرشيف الرقمي للصحف والمجلات بشراكة دار الكتب مع المؤسسات الصحفية. رابعًا أرشيف الإنترنت المصري لحفظ النتاج الفكري الوطني وتتولاه مكتبة الإسكندرية. خامسًا المكتبة الرقمية للبحوث والدوريات العلمية لاستثمار مشروع ستارز وتوسيع نطاقه. سادسًا برنامج المشاركة التعاونية لتكوين اتحادات مكتبات ودعم الإعارة المتبادلة للمصادر الرقمية. سابعًا بوابات المكتبات الرقمية لتصميم نظم البحث والاسترجاع. ثامنًا برنامج الحفظ الرقمي للإنتاج الفكري المصري بموجب قانون الإيداع المعدل. تاسعًا برنامج الربط الشبكي باستخدام النظم المفتوحة المصدر. عاشرًا برنامج الدعم التمويلي والتسويقي لتوفير الدعم عبر الهبات والمنح وبرامج الشراكة.\n\n### التمويل والتأهيل والتدريب\n\nارتفعت تكاليف إنشاء وتطوير مشروعات المكتبة الرقمية مما يفرض تبنى نموذج اقتصادي لتمويلها من خلال اشتراكات الأعضاء والمنح والهبات وتسويق البحوث والخدمات المطورة. وتعد الموارد البشرية من أهم عناصر المنظومة المقترحة إذ إن أخصائي المكتبات المستقبلي ليس المنهمك في الأعمال الروتينية بل المساهم بقوة في بناء العالم الرقمي. وتكمن مشكلة التأهيل المهني في الفجوة الزمنية بين ظهور التقنيات وتعديل اللوائح الجامعية التي تصل إلى خمس سنوات فأكثر. ويقترح الباحث حلًا على مستويين: الأول بتحديث المقررات الدراسية، والثاني عبر مراكز التدريب كدبلوم المكتبة الرقمية بالمنظمة العربية للتنمية الإدارية. ويتوزع البرنامج التأهيلي المقترح على ثمانية محاور: مدخل عام ومشروعات المكتبات الرقمية والمتطلبات الفنية والوظيفية والتحويل الرقمي وخدمات المعلومات في البيئة الرقمية وحقوق الملكية الفكرية وإدارة المشروعات.\n\n### مصادر التمويل والنموذج الاقتصادي المقترح\n\nمن الملاحظات الأساسية حول مشروعات المكتبة الرقمية ارتفاع تكاليف إنشائها وتطويرها وهو الأمر الذي يفرض ضرورة تبنى نموذج اقتصادي لتمويل ودعم هذه المشروعات. ويمكن توفير مصادر الدعم المالي لهذه المنظومة من خلال عدة قنوات: اشتراكات مرافق المعلومات الأعضاء بها، والمنح والهبات من المؤسسات الحكومية والأهلية والدولية، وتسويق البحوث والخدمات والنظم التي تم تطويرها في إطار المنظومة. وقد أشار الباحث إلى أن بعض البرامج المقترحة يمكن أن تكون ربحية بالفعل مثل برنامج المكتبة الرقمية للبحوث والدوريات العلمية لارتباطه بمجتمع النشر الأكاديمي حيث تتوفر آليات التسعير والاشتراكات المميزة. كما أن خدمات الأرشيف الرقمي وبوابات المعلومات المتخصصة تمثل فرصًا لتوليد عائد مالي يمكن إعادة استثماره في تطوير المشروعات وتوسيع نطاقها. ويتطلب النموذج الاقتصادي المقترح دراسة جدوى تفصيلية لكل برنامج على حدة مع تحديد التكاليف الرأسمالية والتشغيلية ومصادر الإيرادات المتوقعة.\n\n### برنامج الربط الشبكي والنظم المفتوحة المصدر\n\nيُعد برنامج الربط الشبكي من أهم برامج دعم المنظومة المقترحة حيث يهدف إلى استكمال البنية الأساسية لبيئة العمل الموزعة بالمكتبات ومرافق المعلومات. يقترح الباحث أن يبدأ تنفيذ هذا المشروع باستغلال شبكة الإنترنت والبروتوكولات العاملة بها كأساس للربط الشبكي بين المؤسسات الأعضاء في المنظومة. وتتولى وزارة الاتصالات وتكنولوجيا المعلومات تنفيذ هذا البرنامج مع التوصية القوية بالتوجه نحو النظم المفتوحة المصدر وتكييفها بما يلائم البيئة المصرية بدلاً من ضياع الوقت والجهد في بناء نظم وتطبيقات من الصفر. وهذا التوجه يعكس رؤية واقعية تراعي إمكانيات مصر التقنية وتسعى للاستفادة القصوى من الجهود الدولية في تطوير نظم إدارة المكتبات الرقمية. كما أن الربط الشبكي يمثل البنية التحتية اللازمة لتحقيق هدف التوزيع الجغرافي للمحتوى الرقمي الذي تقوم عليه المنظومة المقترحة بالكامل.\n\n### الفجوة الزمنية في التأهيل المهني وحلولها\n\nتتمحور مشكلة التأهيل المهني لأخصائيي المعلومات على المستوى الرسمي في مصر حول الفجوة الزمنية بين ظهور التقنيات الحديثة وتعديل لوائح الأقسام العلمية بالجامعات المصرية والتي تصل إلى خمس سنوات فأكثر. هذه الفجوة تعني أن الخريج قد يتلقى تعليمًا بمعارف ومهارات تجاوزها التطور التقني المتسارع في مجال المكتبات الرقمية. ويرى الباحث أن حل هذه المشكلة يتحقق على مستويين متكاملين: المستوى الأول يقع على عاتق أعضاء هيئة التدريس في أقسام المكتبات والمعلومات والتزامهم المهني والأكاديمي بتحديث محتويات المقررات الدراسية باستمرار لمواكبة التوجهات الحديثة في ظل المسمى الرسمي للمقررات المعتمدة. والمستوى الثاني يتمثل في جهود مراكز التدريب والتأهيل المتخصصة ومن أمثلتها البارزة دبلوم المكتبة الرقمية الذي تقدمه المنظمة العربية للتنمية الإدارية والدورات التدريبية المتخصصة في مجالات الرقمنة والحفظ الرقمي وتنمية المجموعات الرقمية والميتاداتا. كذلك الدورات التدريبية التي عقدها الاتحاد العربي للمكتبات والمعلومات في عواصم عربية مختلفة مثل تونس وبيروت وطرابلس. ويشير الباحث إلى أهمية عدم تقسيم البرامج التعليمية إلى شعبتين منفصلتين للمكتبات التقليدية والمكتبات الرقمية بل توسيع المناهج التقليدية لتشمل مسارًا أكثر عمومية وشملًا يتعلق بالمكتبات الرقمية كجزء لا يتجزأ من تعليم علوم المكتبات والمعلومات في العصر الرقمي."

  "ch1": "مقدمة الفصل الأول: الأنشطة العامة التي تقوم بها مختلف أنواع المكتبات ومراكز المعلومات\n\n تعريف المكتبات ومراكز المعلومات وأهميتها\nتُعرّف المؤسسات المعلوماتية بأنها مؤسسات علمية وثقافية تهدف إلى جمع وتنظيم واسترجاع وبث مصادر المعلومات بكافة أشكالها، ثم تسهيل أو تيسير وصول الباحثين والمستفيدين إلى هذه المصادر بأسرع وقت وأقل جهد وأقصى دعة ممكنة. وتتعدد أنواع المكتبات فمنها المكتبات الوطنية والجامعية ومكتبات الكليات والأقسام العلمية، والمكتبات العامة والمدرسية، والمكتبات المتخصصة في دور الصحف أو الوز",
  "ch3": "مقدمة الفصل الثالث: الخدمة المرجعية الإلكترونية\n\n أولاً: خدمة الرد على الاستفسارات\n# مفهوم الخدمة المرجعية والهدف منها وأهميتها\nإن الهدف الرئيسي من تقديم خدمة الرد على الاستفسارات هو الإجابة على استفسارات المستفيدين بأقصى سرعة ممكنة وبدقة متناهية بحيث يشعر المستفيد بأنه قد تم إشباع حاجته إلى المعلومات. وتعتمد تلك الخدمة على مجموعة من المقومات الأساسية التي تساعد على تقديم الخدمة بكفاءة وفعالية. وتشمل هذه المقومات ثلاثة عناصر جوهرية: أولاً مجموعة متميزة من مصادر المعلومات المرجعية يتم اختيارها بع",
  "ch4": "المكتبة المدرسية كمركز لمصادر التعلم\n\n المقدمة: المكتبة المدرسية والنظام التعليمي\n\nتعتبر المكتبة المدرسية جزءاً لا يتجزأً من النظام التعليمي وأحد أركانه الأساسية، إذ ترتبط ارتباطاً عضوياً بأهداف وبرامج وفلسفة النظام التعليمي المتبع في المراحل الابتدائية والمتوسطة والثانوية. فالمكتبة ليست كياناً منعزلاً بل هي مكملة لبرامج المدرسة وخدماتها، وتتأثر أهدافها ومشكلاتها بمشكلات وأهداف المنظومة التعليمية ككل. والنظام التعليمي الحديث لا يقف عند حد تحفيظ التلاميذ وتلقينهم قدراً معيناً من المعلومات في موضو",
  "ch5": "المكتبات الأكاديمية ودورها في خدمة التعليم والبحث العلمي والمجتمع\n\n تقديم: مفهوم المكتبات الأكاديمية وأشكالها المتنوعة\n\nتختلف أشكال وأنواع المكتبات الأكاديمية باختلاف المعاهد العليا التي تخدمها تلك المكتبات، فعلى الرغم من أن الوظيفة الرئيسية للمكتبة الأكاديمية تتركز في تقديم المصادر والخدمات المكتبية التي تحقق الأهداف والبرامج التعليمية للمعهد الذي تنتمي إليه، إلا أن كل شكل من أشكال المكتبات الأكاديمية له خصائصه ومشكلاته المتميزة. وتتنوع المكتبات الأكاديمية لتشمل مكتبات المعاهد المتوسطة كالمعاهد",
  "ch6": "مقدمة: الرقمنة والاختزان الرقمي\n\nتتبع المكتبات الرقمية في تنمية مقتنياتها أحد أسلوبين أساسيين: أولهما الاعتماد على المصادر الرقمية المولدة إلكترونيًا والمعروفة بالمصادر المولدة رقميًا، وثانيهما رقمنة المصادر التقليدية المطبوعة أو المصورة أو المسجلة على أوعية غير رقمية. ويتناول هذا الفصل جهود مرافق المعلومات في مصر لرقمنة مصادر المعلومات المختلفة، والإجراءات المتبعة في ذلك، والتقنيات المستخدمة في سياق الممارسات العالمية في هذا الصدد. كما يعرض أساليب الاختزان والحفظ الرقمي للمصادر الرقمية والمرقمن",
  "ch7": "مقدمة: التخطيط الوطني للمكتبات الرقمية في مصر\n\nتشهد مصر منذ أواخر التسعينيات وبداية الألفية الثالثة طفرة في الاهتمام بإنشاء المكتبات ومرافق المعلومات وتطويرها على كافة المستويات وتصحبها طفرة أخرى في إعداد البنية الأساسية للاتصالات ونظم المعلومات. وهو ما يترتب عليه ضرورة وجود منظومة متكاملة تجمع شمل هذه المؤسسات باختلاف أهدافها ومناشطها على المستوى الوطني في ظل سياسة وطنية واضحة المعالم ومعلنة لتحقيق التكاملية وتجنب تكرار الجهد وترشيد النفقات من خلال المشاركة في الموارد والتغلب على المعوقات الإدا"
 },
